   PLAYLIST EDITOR — edit order, add/remove items
   ═══════════════════════════════════════════════ */
const PlaylistEditor = {
  currentPlaylistId: null,
  currentPlaylistName: null,
  items: [],
  draggedItem: null,

  async load(plId, plName){
    this.currentPlaylistId = plId;
    this.currentPlaylistName = plName;
    this.items = [];
    this.draggedItem = null;

    var container = el('playlistEditorContainer');
    container.innerHTML = '<div style="padding:12px;color:var(--text3);">Loading playlist items…</div>';

    try {
      var userId = getEmbySettings().userId;
      var plData = await apiGet('/Playlists/' + plId + '/Items?UserId=' + userId + '&Fields=Id,Name,ProductionYear,PremiereDate,PlaylistItemId&Limit=500');
      var items = (plData && plData.Items) || [];
      
      if(!items.length){
        container.innerHTML = '<div style="padding:12px;color:var(--text3);">Playlist is empty</div>';
        return;
      }

      this.items = items.map(function(i, idx){
        return {
          id: i.Id,
          playlistItemId: i.PlaylistItemId,
          name: i.Name || 'Untitled',
          year: i.ProductionYear || null,
          index: idx
        };
      });

      this.render(container);
    } catch(e){
      container.innerHTML = '<div style="padding:12px;color:var(--danger);">Failed to load playlist: ' + esc(e.message) + '</div>';
    }
  },

  render(container){
    var itemsHtml = this.items.map(function(item, idx){
      return '<div class="playlist-item" data-item-id="' + esc(item.id) + '" draggable="true">' +
        '<div class="playlist-item-drag-handle" onmousedown="PlaylistEditor.startDrag(event, ' + idx + ')">::</div>' +
        '<div class="playlist-item-info">' +
          '<div class="playlist-item-title">' + esc(item.name) + (item.year ? ' (' + item.year + ')' : '') + '</div>' +
        '</div>' +
        '<div class="playlist-item-controls">' +
          (idx > 0 ? '<button class="btn-icon" onclick="PlaylistEditor.moveUp(' + idx + ')" title="Move up"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"></polyline></svg></button>' : '') +
          (idx < this.items.length - 1 ? '<button class="btn-icon" onclick="PlaylistEditor.moveDown(' + idx + ')" title="Move down"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg></button>' : '') +
          '<button class="btn-icon danger" onclick="PlaylistEditor.removeItem(' + idx + ')" title="Remove from playlist"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>' +
        '</div>' +
      '</div>';
    }.bind(this)).join('');

    container.innerHTML = 
      '<div style="border-top:1px solid var(--border);padding-top:20px;">' +
        '<h3 style="margin:0 0 14px;display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);">' +
          '<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"></path></svg>' +
          'Edit Playlist Order' +
        '</h3>' +
        '<div class="hint" style="margin-bottom:14px;">Drag items to reorder, or use arrows. Add new titles below.</div>' +
        '<div class="playlist-items-list">' + itemsHtml + '</div>' +
        '<div style="display:flex;gap:8px;margin-top:14px;">' +
          '<input type="text" id="addPlaylistItemInput" placeholder="Add movie title…" style="flex:1;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:inherit;" onkeydown="if(event.key===\'Enter\') PlaylistEditor.addTitle()">' +
          '<button class="btn btn-primary" onclick="PlaylistEditor.addTitle()">+ Add</button>' +
        '</div>' +
        '<div style="display:flex;gap:8px;margin-top:12px;">' +
          '<button class="btn btn-secondary" onclick="PlaylistEditor.cancel()">Cancel</button>' +
          '<button class="btn btn-primary" onclick="PlaylistEditor.saveChanges()" style="flex:1;">Save Changes</button>' +
        '</div>' +
      '</div>';

    var items = container.querySelectorAll('.playlist-item');
    items.forEach(function(item, idx){
      item.addEventListener('dragstart', function(){ PlaylistEditor.onDragStart(idx); });
      item.addEventListener('dragover', function(e){ e.preventDefault(); });
      item.addEventListener('drop', function(){ PlaylistEditor.onDrop(idx); });
      item.addEventListener('dragend', function(){ PlaylistEditor.onDragEnd(); });
      item.addEventListener('dragenter', function(){ PlaylistEditor.onDragEnter(idx); });
      item.addEventListener('dragleave', function(){ PlaylistEditor.onDragLeave(idx); });
    });
  },

  startDrag(e, idx){ this.draggedItem = idx; },
  onDragStart(idx){ this.draggedItem = idx; },
  onDragEnter(idx){
    if(this.draggedItem !== null && this.draggedItem !== idx){
      var item = el('playlistEditorContainer').querySelectorAll('.playlist-item')[idx];
      item.style.opacity = '0.5';
    }
  },
  onDragLeave(idx){
    var item = el('playlistEditorContainer').querySelectorAll('.playlist-item')[idx];
    item.style.opacity = '1';
  },
  onDrop(idx){
    if(this.draggedItem === null || this.draggedItem === idx) return;
    var items = el('playlistEditorContainer').querySelectorAll('.playlist-item');
    items[idx].style.opacity = '1';
    var temp = this.items[this.draggedItem];
    this.items.splice(this.draggedItem, 1);
    this.items.splice(idx, 0, temp);
    this.render(el('playlistEditorContainer'));
  },
  onDragEnd(){
    var items = el('playlistEditorContainer').querySelectorAll('.playlist-item');
    items.forEach(function(item){ item.style.opacity = '1'; });
    this.draggedItem = null;
  },

  moveUp(idx){
    if(idx === 0) return;
    var temp = this.items[idx];
    this.items[idx] = this.items[idx - 1];
    this.items[idx - 1] = temp;
    this.render(el('playlistEditorContainer'));
  },

  moveDown(idx){
    if(idx >= this.items.length - 1) return;
    var temp = this.items[idx];
    this.items[idx] = this.items[idx + 1];
    this.items[idx + 1] = temp;
    this.render(el('playlistEditorContainer'));
  },

  removeItem(idx){
    var removed = this.items[idx];
    this.items.splice(idx, 1);
    toast('✕ Removed "' + esc(removed.name) + '" — Save Changes to persist', 'warn');
    this.render(el('playlistEditorContainer'));
  },

  async addTitle(){
    var input = el('addPlaylistItemInput');
    var title = (input.value || '').trim();
    if(!title){ toast('Enter a title', 'warn'); return; }

    toast('Searching library for "' + esc(title) + '"…', 'inf');
    try {
      var userId = getEmbySettings().userId;
      var data = await apiGet('/Items?IncludeItemTypes=Movie&Recursive=true&SearchTerm=' + encodeURIComponent(title) + '&Fields=Id,Name,ProductionYear&Limit=10&UserId=' + userId);
      var matches = (data && data.Items) || [];

      if(!matches.length){
        toast('Movie not found in library: "' + esc(title) + '"', 'warn');
        return;
      }

      // Take the closest match (first result)
      var found = matches[0];

      if(this.items.find(function(i){ return i.id === found.Id; })){
        toast('"' + esc(found.Name) + '" is already in the playlist', 'warn');
        return;
      }

      this.items.push({
        id: found.Id,
        playlistItemId: null,
        name: found.Name,
        year: found.ProductionYear || null,
        index: this.items.length
      });
      toast('✓ Added "' + esc(found.Name) + '" to playlist', 'ok');
      input.value = '';
      this.render(el('playlistEditorContainer'));
    } catch(e){
      toast('Search failed: ' + e.message, 'err');
    }
  },

  cancel(){
    el('playlistEditorContainer').innerHTML = '';
    this.currentPlaylistId = null;
    this.currentPlaylistName = null;
    this.items = [];
    toast('Edits discarded', 'inf');
  },

  async saveChanges(){
    if(!this.currentPlaylistId){ toast('No playlist selected', 'err'); return; }
    var userId = getEmbySettings().userId;
    var plId = this.currentPlaylistId;
    try {
      var plData = await apiGet('/Playlists/' + plId + '/Items?UserId=' + userId + '&Fields=Id,Name,PlaylistItemId&Limit=500');
      var currentItems = (plData && plData.Items) || [];
      var currentMap = {};
      currentItems.forEach(function(i){ currentMap[i.Id] = i; });
      
      // Step 1: Delete items that were removed from this.items
      var currentIds = this.items.map(function(i){ return i.id; });
      var toDelete = currentItems.filter(function(i){ return currentIds.indexOf(i.Id) === -1; });
      if(toDelete.length){
        // For playlists, use PlaylistItemId; for collections, use Id
        var deleteIds = toDelete.map(function(i){ return i.PlaylistItemId || i.Id; });
        console.log('🗑️  Deleting ' + deleteIds.length + ' removed items:', deleteIds);
        await fetch('/api/collections/' + plId + '/items', {
          method: 'DELETE',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ids: deleteIds, isPlaylist: !!toDelete[0].PlaylistItemId})
        });
      }
      
      // Step 2: Add new items
      var toAdd = this.items.filter(function(i){ return !i.playlistItemId && !currentMap[i.id]; });
      if(toAdd.length){
        var addIds = toAdd.map(function(i){ return i.id; }).join(',');
        await apiPost('/Playlists/' + plId + '/Items?UserId=' + userId + '&Ids=' + addIds, null);
      }
      
      // Step 3: Re-fetch and reorder
      var plData2 = await apiGet('/Playlists/' + plId + '/Items?UserId=' + userId + '&Fields=Id,Name,PlaylistItemId&Limit=500');
      var updated = (plData2 && plData2.Items) || [];
      var updatedMap = {};
      updated.forEach(function(i){ updatedMap[i.Id] = i; });
      for(var i = 0; i < this.items.length; i++){
        var item = this.items[i];
        var embyItem = updatedMap[item.id];
        if(embyItem){
          await apiPost('/Playlists/' + plId + '/Items/' + embyItem.PlaylistItemId + '/Move/' + i, null);
        }
      }
      toast('✓ Playlist saved: ' + this.items.length + ' items in new order' + (toDelete.length ? ', ' + toDelete.length + ' removed' : ''), 'ok');
      await this.load(plId, this.currentPlaylistName);
    } catch(e){
      toast('Failed to save: ' + e.message, 'err');
    }
  }
};

  draggedIdx: null,

    var temp = this.editingTitles[this.draggedIdx];

    this.editingTitles.splice(idx, 0, temp);
    this.render();

  moveUp(idx){
    if(idx === 0) return;
    var temp = this.editingTitles[idx];
    this.editingTitles[idx] = this.editingTitles[idx - 1];
    this.editingTitles[idx - 1] = temp;
    this.render();
  },

  moveDown(idx){
    if(idx >= this.editingTitles.length - 1) return;
    var temp = this.editingTitles[idx];
    this.editingTitles[idx] = this.editingTitles[idx + 1];
    this.editingTitles[idx + 1] = temp;
    this.render();

    if(this.editingTitles.indexOf(title) !== -1){
      toast('"' + esc(title) + '" is already in this franchise', 'warn');
      return;
    }
    this.editingTitles.push(title);
    toast('✓ Added "' + esc(title) + '"', 'ok');
    input.value = '';
    this.render();

  saveFranchise(){
    if(!this.currentFranchise){ toast('No franchise selected', 'err'); return; }

    try {
      if(this.currentSource === 'builtin'){
        // Update CSV_FRANCHISES (in-memory only; for persistent storage, upload would need backend support)
        CSV_FRANCHISES[this.currentFranchise] = this.editingTitles.slice();
        toast('✓ "' + esc(this.currentFranchise) + '" updated — ' + this.editingTitles.length + ' titles', 'ok');

        var tmdbSaved = {};
        try{ tmdbSaved = JSON.parse(localStorage.getItem('cp_tmdb_franchises') || '{}'); }catch(e){}

    el('franchiseEditorContent').innerHTML = '';
    el('fchEditorBuiltin').value = '';
    el('fchEditorTmdb').value = '';
    toast('Edits discarded', 'inf');
  }

                '<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>' +
              '</button>' +
              '<button class="btn" onclick="FranchiseBuilder.createPlaylist()" style="flex:1.3;" title="Scan your library for this franchise and create a new playlist from the matches">' +
                '<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>' +
                'Create Playlist' +
              '</button>' +
              '<button class="btn btn-primary" onclick="FranchiseBuilder.doRefresh()" style="flex:1.3;">' +
                '<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>' +
                'Refresh Playlist' +
              '</button>' +
              '<button class="btn" id="orderSourceBuiltin" onclick="FranchiseBuilder.setOrderSource(\'builtin\')" style="flex:1;background:var(--accent);color:#fff;">Built-in / Uploaded</button>' +
              '<button class="btn" id="orderSourceTmdb" onclick="FranchiseBuilder.setOrderSource(\'tmdb\')" style="flex:1;">TMDB Order</button>' +
            '</div>' +
          '</div>' +
          '<div id="playlistEditorContainer"></div>';
          
        FranchiseBuilder.updateOrderSourceButtons();
        FranchiseBuilder.updateFranchiseOptions();
      } catch(e) {
        console.error('Error in FranchiseBuilder.mount:', e);
        container.innerHTML = '<div style="padding:20px;color:var(--danger);">Error loading playlists: ' + esc(e.message) + '</div>';
      }
    })();
  },

  async fetchPlaylists(){
    // UserId is required here — without it, IncludeItemTypes doesn't actually
    // filter and returns the whole library. Recursive=true is still needed
    // or nested playlists get missed; that can return the same playlist once
    // per folder it's nested under, so we dedupe by Id too.
    var userId = getEmbySettings().userId;
    var data = await apiGet('/Items?Recursive=true&IncludeItemTypes=Playlist&UserId=' + userId + '&Fields=Id,Name');
    var rawItems = (data && data.Items) || [];
    var seen = {};
    var playlists = [];
    rawItems.forEach(function(p){
      if(!seen[p.Id]){
        seen[p.Id] = true;
        playlists.push(p);
      }
    });
    playlists.sort(function(a,b){ return (a.Name||'').localeCompare(b.Name||''); });
    console.log('Loaded playlists from Emby:', rawItems.length, '(', playlists.length, 'unique)');
    this.playlists = playlists;
    return playlists;
  },

  async reloadPlaylists(){
    var btn = el('reloadPlaylistsBtn');
    if(btn) btn.disabled = true;
    try{
      var previousId = this.currentPlaylistId;
      await this.fetchPlaylists();

      var select = el('refPlaylistSelect');
      if(select){
        select.innerHTML = '<option value="">— select playlist —</option>' +
          this.playlists.map(function(p){ return '<option value="' + esc(p.Id) + '">' + esc(p.Name) + '</option>'; }).join('');

        var stillExists = previousId && this.playlists.find(function(p){ return p.Id === previousId; });
        if(stillExists){
          select.value = previousId;
        } else if(previousId){
          // The previously-selected playlist is gone — clear the editor too
          this.currentPlaylistId = null;
          this.currentPlaylistName = null;
          var editorBox = el('playlistEditorContainer');
          if(editorBox) editorBox.innerHTML = '';
          toast('Previously selected playlist no longer exists', 'warn');
        }
      }
      toast('✓ Reloaded ' + this.playlists.length + ' playlist(s)', 'ok');
    } catch(e){
      toast('Reload failed: ' + e.message, 'err');
    } finally {
      if(btn) btn.disabled = false;
    }
  },

  selectPlaylist(plId){
    if(!plId){
      this.currentPlaylistId = null;
      this.currentPlaylistName = null;
      el('playlistEditorContainer').innerHTML = '';
      return;
    }
    var pl = (this.playlists || []).find(function(p){ return p.Id === plId; });
    if(!pl) return;
    this.currentPlaylistId = plId;
    this.currentPlaylistName = pl.Name;
    PlaylistEditor.load(plId, pl.Name);
  },

  setOrderSource(src){
    this.orderSource = src;
    this.updateOrderSourceButtons();
    this.updateFranchiseOptions();
  },

  updateFranchiseOptions(){
    var select = el('refFranchiseSelect');
    if(!select) return;
    var names = this.orderSource === 'tmdb' ? (this.tmdbNames || []) : (this.builtinNames || []);
    var groupLabel = this.orderSource === 'tmdb' ? 'TMDB' : 'Built In';
    var prefix = this.orderSource === 'tmdb' ? 'tmdb::' : 'builtin::';
    var html = '<option value="">— select franchise —</option>';
    if(names.length){
      html += '<optgroup label="' + groupLabel + '">' +
        names.map(function(n){ return '<option value="' + prefix + esc(n) + '">' + esc(n) + '</option>'; }).join('') +
      '</optgroup>';
    }
    select.innerHTML = html;
  },

  updateOrderSourceButtons(){
    var btn1 = el('orderSourceBuiltin');
    var btn2 = el('orderSourceTmdb');
    if(btn1){
      btn1.style.background = this.orderSource === 'builtin' ? 'var(--accent)' : 'var(--surface2)';
      btn1.style.color = this.orderSource === 'builtin' ? '#fff' : 'var(--text)';
    }
    if(btn2){
      btn2.style.background = this.orderSource === 'tmdb' ? 'var(--accent)' : 'var(--surface2)';
      btn2.style.color = this.orderSource === 'tmdb' ? '#fff' : 'var(--text)';
    }
  },

  // Shared by doRefresh() and createPlaylist() — reads the franchise dropdown,
  // figures out which source it came from, and resolves the title list.
  _getSelectedFranchise(){
    var frSource = el('refFranchiseSelect').value;
    if(!frSource){ toast('Select a franchise','warn'); return null; }

    var isTmdb = frSource.indexOf('tmdb::') === 0;
    var isBuiltin = frSource.indexOf('builtin::') === 0;
    if(!isTmdb && !isBuiltin){ toast('Invalid franchise selection','err'); return null; }

    var frName = frSource.slice(frSource.indexOf('::') + 2);
    var titles;
    if(isBuiltin){
      titles = CSV_FRANCHISES[frName] || [];
    } else {
      var tmdbSaved = {};
      try{ tmdbSaved = JSON.parse(localStorage.getItem('cp_tmdb_franchises') || '{}'); }catch(e){}
      var entry = tmdbSaved[frName];
      titles = entry ? (entry.movies || entry) : [];
    }

    if(!titles || !titles.length){ toast('No titles found for this franchise','warn'); return null; }
    return { name: frName, titles: titles };
  },

  async doRefresh(){
    var plId = el('refPlaylistSelect').value;
    if(!plId){ toast('Select a playlist','warn'); return; }

    var fr = this._getSelectedFranchise();
    if(!fr) return;

    try{
      await doPlaylistRefresh(plId, fr.titles, fr.name);
      if(this.currentPlaylistId === plId){
        await PlaylistEditor.load(plId, this.currentPlaylistName);
      }
    } catch(e){
      toast('Refresh failed: ' + e.message, 'err');
    }
  },

  // Scans the library for every title in the selected franchise and creates
  // a brand-new Emby playlist from whatever matches, in franchise order.
  async createPlaylist(){
    var fr = this._getSelectedFranchise();
    if(!fr) return;

    var defaultName = fr.name.replace(/ \(TMDB\)$/, '');
    var playlistName = window.prompt('Name for the new playlist:', defaultName);
    if(playlistName === null) return; // user cancelled
    playlistName = playlistName.trim();
    if(!playlistName){ toast('Playlist name cannot be empty', 'warn'); return; }

    var result = await doCreatePlaylist(playlistName, fr.titles, fr.name);
    if(result && result.id){
      // Pull the new playlist into the dropdown and jump straight to editing it
      await this.reloadPlaylists();
      var select = el('refPlaylistSelect');
      if(select){
        select.value = result.id;
        this.selectPlaylist(result.id);
      }
    }
  }
};

/* ---------- CSV import — same order-preserving match as Franchise mode,
   just sourced from an uploaded file instead of a textarea ---------- */
const CsvBuilder = {
  lastPreview: null,
  parsedTitles: [],

  mount(container){
    this.lastPreview = null;
    this.parsedTitles = [];
    container.innerHTML =
      '<div class="field-row">' +
        '<div class="field"><label>Collection name</label><input type="text" id="csvName" placeholder="e.g. My Franchise List"></div>' +
      '</div>' +
      '<div class="field">' +
        '<label>CSV file</label>' +
        '<input type="file" id="csvFile" accept=".csv,text/csv" onchange="CsvBuilder.handleFile(event)" style="padding:8px;">' +
        '<div class="hint">One title per row. First column is used; a header row is detected and skipped automatically. Row order is preserved.</div>' +
      '</div>' +
      '<div id="csvParsedInfo"></div>' +
      '<div style="display:flex;gap:8px;margin-top:12px;">' +
        '<button class="btn btn-secondary" onclick="CsvBuilder.preview()">Preview</button>' +
        '<button class="btn btn-primary" id="csvCreateBtn" onclick="CsvBuilder.create()" disabled>Create Playlist</button>' +
      '</div>' +
      '<div id="csvPreviewBox"></div>';
  },

  handleFile(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      var lines = ev.target.result.split(/\r?\n/).map(function(l){ return l.trim(); }).filter(Boolean);
      if(!lines.length){ toast('CSV appears empty', 'warn'); return; }

      // First column only, strip surrounding quotes if present
      var rows = lines.map(function(l){
        var first = l.split(',')[0] || '';
        return first.replace(/^"|"$/g, '').trim();
      });

      // Detect and skip an obvious header row (e.g. "title", "name", "movie")
      var headerWords = ['title','name','movie','film'];
      if(rows.length && headerWords.indexOf(rows[0].toLowerCase()) !== -1){
        rows = rows.slice(1);
      }

      CsvBuilder.parsedTitles = rows.filter(Boolean);
      el('csvParsedInfo').innerHTML = '<div class="hint">' + CsvBuilder.parsedTitles.length + ' title(s) read from ' + esc(file.name) + '</div>';
    };
    reader.readAsText(file);
  },

  async preview(){
    var box = el('csvPreviewBox');
    if(!this.parsedTitles.length){ toast('Choose a CSV file first', 'warn'); return; }

    box.innerHTML = '<div class="preview-box">Matching against your library…</div>';
    el('csvCreateBtn').disabled = true;
    try{
      var r = await fetch('/api/franchise/preview', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({titles:this.parsedTitles}) });
      var result = await r.json();
      if(!result.success){ box.innerHTML = '<div class="preview-box" style="color:var(--danger);">' + esc(result.error) + '</div>'; return; }

      this.lastPreview = result;
      var orderedHtml = this.parsedTitles.map(function(t){
        var hit = result.matched.find(function(m){ return m.title === t; });
        return hit ? '<li>✓ ' + esc(t) + '</li>' : '<li style="color:var(--text3);">— ' + esc(t) + ' (not in library)</li>';
      }).join('');

      box.innerHTML = '<div class="preview-box">' +
        '<span class="count">' + result.matchedCount + '</span> of ' + result.totalCount + ' found' +
        '<ul class="preview-list">' + orderedHtml + '</ul>' +
      '</div>';
      el('csvCreateBtn').disabled = result.matchedCount === 0;
    } catch(e){
      box.innerHTML = '<div class="preview-box" style="color:var(--danger);">' + esc(e.message) + '</div>';
    }
  },

  async create(){
    var name = (el('csvName').value || '').trim();
    if(!name){ toast('Name the collection first', 'warn'); return; }
    if(!this.lastPreview || !this.lastPreview.matchedCount){ toast('Run Preview first', 'warn'); return; }

    var orderedEmbyIds = this.parsedTitles
      .map(function(t){ var hit = CsvBuilder.lastPreview.matched.find(function(m){ return m.title === t; }); return hit ? hit.embyId : null; })
      .filter(Boolean);

    try{
      var r = await fetch('/api/import/create', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ name:name, source:'Playlist', kind:'playlist', matchedEmbyIds:orderedEmbyIds, allTitles:this.lastPreview.allTitles, missingTitles:this.lastPreview.missing||[] })
      });
      var result = await r.json();
      if(!result.success){ toast('Create failed: ' + (result.error||'Unknown error'), 'err'); return; }

      upsertLocalCollection({
        embyId: result.collection.id, name: name, source: 'Playlist', kind: 'playlist',
        originalTitles: this.lastPreview.allTitles, importedTitles: this.lastPreview.allTitles,
        missingTitles: this.lastPreview.missing || [], savedAt: new Date().toISOString()
      });

      toast('✓ "' + esc(name) + '" created — ' + orderedEmbyIds.length + ' items', 'ok');
      Builder.close();
      await AppData.loadAll();
      renderSourceFilter(); renderSidebarStatus(); CollectionList.render();
    } catch(e){
      toast('Create request failed: ' + e.message, 'err');
    }
  }
};

  async exchangeTraktPin(){
    var clientId = (el('traktClientId').value || '').trim();
    var clientSecret = (el('traktClientSecret').value || '').trim();
    var pin = (el('traktPin').value || '').trim().toUpperCase();
    var status = el('traktAuthStatus');

    if(!clientId){ toast('Enter your Client ID', 'warn'); return; }
    if(!clientSecret){ toast('Enter your Client Secret', 'warn'); return; }
    if(!pin){ toast('Enter the PIN from Trakt', 'warn'); return; }

    status.textContent = 'Exchanging PIN for an access token…';
    try{
      // This goes directly from the browser to Trakt — never through our
      // backend — same as the original app, so the Client Secret never
      // transits or persists anywhere on this server.
      var tokenResp = await fetch('https://api.trakt.tv/oauth/token', {
        method:'POST', headers:{'Content-Type':'application/json','trakt-api-version':'2'},
        body: JSON.stringify({ code:pin, client_id:clientId, client_secret:clientSecret, redirect_uri:'urn:ietf:wg:oauth:2.0:oob', grant_type:'authorization_code' })
      });
      if(!tokenResp.ok) throw new Error('HTTP ' + tokenResp.status + ' — check your Client ID/Secret and PIN');
      var tokenData = await tokenResp.json();
      if(!tokenData.access_token) throw new Error('No access token in response');

      var userResp = await fetch('https://api.trakt.tv/users/me', {
        headers: { 'Authorization':'Bearer '+tokenData.access_token, 'trakt-api-version':'2', 'trakt-api-key':clientId }
      });
      if(!userResp.ok) throw new Error('Got a token but could not fetch your username');
      var userData = await userResp.json();
      var username = userData.username || (userData.user && userData.user.username) || 'unknown';

      // Push to our backend so the scheduled sync can use it without the browser open
      var syncResp = await fetch('/api/credentials/sync', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ trakt: { accessToken: tokenData.access_token, username: username, clientId: clientId } })
      });
      var syncResult = await syncResp.json();
      if(!syncResult.success) throw new Error('Connected to Trakt but could not save to the server: ' + (syncResult.error||''));

      toast('✓ Connected to Trakt as ' + esc(username), 'ok');
      await this.refresh();
    } catch(e){
      status.textContent = 'Failed: ' + e.message;
      toast('Trakt connect failed: ' + e.message, 'err');
    }
  },

  // ═════════════════════════════════════════════
  // SCHEDULE TIMER
  // ═════════════════════════════════════════════
  
  currentScheduleId: null,
  
  loadScheduleTimer(scheduleId){
    if(!scheduleId){ el('timerContent').innerHTML = ''; return; }
    this.currentScheduleId = scheduleId;
    
    var schedule = (AppData.schedules || []).find(s => s.id === scheduleId);
    if(!schedule){ 
      el('timerContent').innerHTML = '<p style="color:var(--text3);">Schedule not found. Try refreshing the page.</p>'; 
      console.warn('Schedule not found:', scheduleId, 'Available:', AppData.schedules);
      return; 
    }
    
    var cron = schedule.cronExpression || '0 3 * * *';
    var freq = this.detectFrequencyFromCron(cron);
    
    // Human-readable description
    var desc = this.describeFrequency(freq);
    
    var html = '<div style="margin-top:16px;padding:14px;background:var(--surface2);border-radius:var(--radius);border-left:4px solid var(--accent);margin-bottom:16px;">' +
      '<p style="margin:0;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-weight:600;">This collection runs:</p>' +
      '<p style="margin:6px 0 0;font-size:15px;color:var(--text);font-weight:500;">' + desc + '</p>' +
    '</div>' +
    '<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border);">' +
      '<p style="font-size:12px;color:var(--text2);margin:0 0 10px;font-weight:500;">Change frequency</p>' +
      '<div style="display:flex;gap:12px;margin-bottom:14px;">' +
        '<label style="display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="radio" name="freqType" value="hourly" ' + (freq.type==='hourly'?'checked':'') + ' onchange="SettingsPanel.setFrequencyType(\'hourly\')"> Hourly</label>' +
        '<label style="display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="radio" name="freqType" value="daily" ' + (freq.type==='daily'?'checked':'') + ' onchange="SettingsPanel.setFrequencyType(\'daily\')"> Daily</label>' +
        '<label style="display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="radio" name="freqType" value="weekly" ' + (freq.type==='weekly'?'checked':'') + ' onchange="SettingsPanel.setFrequencyType(\'weekly\')"> Weekly</label>' +
        '<label style="display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="radio" name="freqType" value="monthly" ' + (freq.type==='monthly'?'checked':'') + ' onchange="SettingsPanel.setFrequencyType(\'monthly\')"> Monthly</label>' +
      '</div>';
    
    // Hourly
    html += '<div id="hourlyOptions" style="display:' + (freq.type==='hourly'?'block':'none') + ';margin-bottom:14px;">' +
      '<div class="field-row"><div class="field"><label>Every</label>' +
      '<select id="hourlyInterval" style="width:100%;">' +
        [1,2,3,4,5,6,8,10,12].map(h => '<option value="' + h + '"' + (freq.interval===h?' selected':'') + '>' + h + ' hour' + (h>1?'s':'') + '</option>').join('') +
      '</select></div></div>' +
    '</div>';
    
    // Daily
    html += '<div id="dailyOptions" style="display:' + (freq.type==='daily'?'block':'none') + ';margin-bottom:14px;">' +
      '<div class="field-row"><div class="field"><label>Run at</label>' +
      '<input type="time" id="dailyTime" value="' + (freq.time || '03:00') + '" style="width:100%;"></div></div>' +
    '</div>';
    
    // Weekly
    html += '<div id="weeklyOptions" style="display:' + (freq.type==='weekly'?'block':'none') + ';margin-bottom:14px;">' +
      '<div class="field-row"><div class="field"><label>Day</label>' +
      '<select id="weeklyDay" style="width:100%;">' +
        ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].map((d,i) => '<option value="' + i + '"' + (freq.day===i?' selected':'') + '>' + d + '</option>').join('') +
      '</select></div></div>' +
      '<div class="field-row"><div class="field"><label>Time</label>' +
      '<input type="time" id="weeklyTime" value="' + (freq.time || '03:00') + '" style="width:100%;"></div></div>' +
    '</div>';
    
    // Monthly
    html += '<div id="monthlyOptions" style="display:' + (freq.type==='monthly'?'block':'none') + ';margin-bottom:14px;">' +
      '<div class="field-row"><div class="field"><label>Date</label>' +
      '<select id="monthlyDate" style="width:100%;">' +
        Array.from({length:31},(v,i) => '<option value="' + (i+1) + '"' + (freq.date===(i+1)?' selected':'') + '>' + (i+1) + ' of month</option>').join('') +
      '</select></div></div>' +
      '<div class="field-row"><div class="field"><label>Time</label>' +
      '<input type="time" id="monthlyTime" value="' + (freq.time || '03:00') + '" style="width:100%;"></div></div>' +
    '</div>';
    
    html += '<button class="btn btn-primary" onclick="SettingsPanel.saveScheduleTimer()" style="margin-top:12px;">Save Schedule</button>';
    html += '</div>';
    
    el('timerContent').innerHTML = html;
  },
  
  describeFrequency(freq){
    if(freq.type === 'hourly'){
      var h = freq.interval;
      return 'Every ' + h + ' hour' + (h>1?'s':'') + ' (24 times per day)';
    } else if(freq.type === 'daily'){
      return 'Once per day at ' + freq.time;
    } else if(freq.type === 'weekly'){
      var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      return 'Once per week on ' + days[freq.day] + ' at ' + freq.time;
    } else if(freq.type === 'monthly'){
      return 'Once per month on the ' + freq.date + this.getOrdinalSuffix(freq.date) + ' at ' + freq.time;
    }
    return 'Unknown frequency';
  },
  
  getOrdinalSuffix(num){
    var j = num % 10, k = num % 100;
    if(j==1 && k!=11) return 'st';
    if(j==2 && k!=12) return 'nd';
    if(j==3 && k!=13) return 'rd';
    return 'th';
  },
  
  setFrequencyType(type){
    el('hourlyOptions').style.display = type==='hourly'?'block':'none';
    el('dailyOptions').style.display = type==='daily'?'block':'none';
    el('weeklyOptions').style.display = type==='weekly'?'block':'none';
    el('monthlyOptions').style.display = type==='monthly'?'block':'none';
  },
  
  detectFrequencyFromCron(cron){
    // cron format: minute hour day month dayOfWeek
    var parts = cron.split(' ');
    var minute = parts[0];
    var hour = parts[1];
    var day = parts[2];
    var month = parts[3];
    var dow = parts[4];
    
    var time = (hour.padStart?hour:hour).toString().padStart(2,'0') + ':' + minute.toString().padStart(2,'0');
    
    // Hourly: */X in hour field
    if(hour.startsWith('*/')){
      return { type:'hourly', interval: parseInt(hour.substring(2)), time: time };
    }
    // Weekly: numeric dow
    if(dow && dow !== '*'){
      return { type:'weekly', day: parseInt(dow), time: time };
    }
    // Monthly: numeric day
    if(day && day !== '*'){
      return { type:'monthly', date: parseInt(day), time: time };
    }
    // Default: Daily
    return { type:'daily', time: time };
  },
  
  async saveScheduleTimer(){
    if(!this.currentScheduleId){ toast('No schedule selected', 'warn'); return; }
    
    var type = document.querySelector('input[name="freqType"]:checked')?.value;
    if(!type){ toast('Select a frequency type', 'warn'); return; }
    
    var newCron = null;
    
    if(type === 'hourly'){
      var interval = el('hourlyInterval').value;
      newCron = '0 */' + interval + ' * * *';
    } else if(type === 'daily'){
      var time = el('dailyTime').value.split(':');
      newCron = time[1] + ' ' + time[0] + ' * * *';
    } else if(type === 'weekly'){
      var wtime = el('weeklyTime').value.split(':');
      var wday = el('weeklyDay').value;
      newCron = wtime[1] + ' ' + wtime[0] + ' * * ' + wday;
    } else if(type === 'monthly'){
      var mtime = el('monthlyTime').value.split(':');
      var mdate = el('monthlyDate').value;
      newCron = mtime[1] + ' ' + mtime[0] + ' ' + mdate + ' * *';
    }
    
    if(!newCron){ toast('Failed to generate cron expression', 'err'); return; }
    
    toast('Saving schedule…', 'inf');
    try{
      var r = await fetch('/api/schedules/' + this.currentScheduleId + '/update-timer', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ cronExpression: newCron, frequencyType: type })
      });
      var result = await r.json();
      if(!result.success){ toast('Failed: ' + result.error, 'err'); return; }
      toast('✓ Schedule updated', 'ok');
      await AppData.loadAll();
      this.refresh();
    } catch(e){
      toast('Save failed: ' + e.message, 'err');
    }
  }
};

    rows.forEach(function(r){
      bySrc[r.source] = (bySrc[r.source]||0) + 1;
      totalItems += r.itemCount || 0;
      totalMissing += r.missingCount || 0;
    });

    // Duplicate names — same title tracked more than once
    var nameCounts = {};
    rows.forEach(function(r){ nameCounts[r.name] = (nameCounts[r.name]||0) + 1; });
    var duplicates = Object.keys(nameCounts).filter(function(n){ return nameCounts[n] > 1; });

    // Top collections by item count
    var top = rows.filter(function(r){ return r.itemCount; }).sort(function(a,b){ return b.itemCount - a.itemCount; }).slice(0, 5);

    var maxSrc = Math.max(1, bySrc.Trakt, bySrc.MDBlists, bySrc.smart, bySrc.emby);
    var srcOrder = ['Trakt','MDBlists','smart','Playlist','emby'];

    var recentSyncs = syncHistory.filter(function(s){ return !s.dryRun; }).slice(0, 8);

    // Cleanup report — things genuinely worth a user's attention
    var cleanup = [];
    rows.forEach(function(r){
      if(r.kind === 'schedule-pending') cleanup.push(esc(r.name) + ' — schedule has never run');
      else if(r.itemCount === 0) cleanup.push(esc(r.name) + ' — empty collection');
      else if((r.source==='Trakt'||r.source==='MDBlists') && !r.lastSync) cleanup.push(esc(r.name) + ' — never synced from source');
    });
    AppData.schedules.forEach(function(s){ if(!s.enabled) cleanup.push(esc(s.playlistName) + ' — schedule disabled'); });

    el('analyticsModalBody').innerHTML =
      '<div class="an-grid">' +
        '<div class="an-card"><div class="v">' + rows.length + '</div><div class="l">Collections</div></div>' +
        '<div class="an-card"><div class="v">' + totalItems + '</div><div class="l">Items tracked</div></div>' +
        '<div class="an-card"><div class="v">' + totalMissing + '</div><div class="l">Missing</div></div>' +
        '<div class="an-card"><div class="v">' + AppData.schedules.length + '</div><div class="l">Schedules</div></div>' +
      '</div>' +

      '<div class="an-section"><h4>By source</h4>' +
        srcOrder.map(function(src){
          var meta = sourceMeta(src);
          var pct = Math.round((bySrc[src]/maxSrc)*100);
          return '<div class="an-bar-row"><span class="an-bar-label">' + meta.label + '</span>' +
            '<div class="an-bar-track"><div class="an-bar-fill" style="width:' + pct + '%;background:var(--src-' + meta.css + ');"></div></div>' +
            '<span class="an-bar-count">' + bySrc[src] + '</span></div>';
        }).join('') +
      '</div>' +

      '<div class="an-section"><h4>Largest collections</h4>' +
        (top.length ? top.map(function(r){ return '<div class="an-list-item"><span>' + esc(r.name) + '</span><span class="n">' + r.itemCount + '</span></div>'; }).join('')
          : '<p style="font-size:12.5px;color:var(--text3);">No item counts yet.</p>') +
      '</div>' +

      (duplicates.length ? '<div class="an-section"><h4>Possible duplicates</h4>' +
        duplicates.map(function(n){ return '<div class="an-list-item"><span>' + esc(n) + '</span><span class="n">×' + nameCounts[n] + '</span></div>'; }).join('') +
      '</div>' : '') +

      (cleanup.length ? '<div class="an-section"><h4>Cleanup report</h4>' +
        cleanup.map(function(c){ return '<div class="an-list-item" style="color:var(--warn);">' + c + '</div>'; }).join('') +
      '</div>' : '') +

      '<div class="an-section"><h4>Collection growth</h4>' +
        '<canvas id="growthChartCanvas" height="160"></canvas>' +
      '</div>' +

      '<div class="an-section"><h4>Sync activity</h4>' +
        '<canvas id="syncActivityChartCanvas" height="160"></canvas>' +
      '</div>';

    loadChartLibrary().then(function(){
      AnalyticsPanel.renderGrowthChart(rows);
      AnalyticsPanel.renderSyncActivityChart(syncHistory);
    }).catch(function(e){ console.error('Chart.js failed to load:', e); });
  },

  renderGrowthChart(rows){
    var ctx = el('growthChartCanvas');
    if(!ctx || !window.Chart) return;
    if(ctx.chartInstance) ctx.chartInstance.destroy();

    var byWeek = {};
    rows.forEach(function(r){
      var dateStr = r.raw && r.raw.createdAt;
      if(!dateStr) return;
      var date = new Date(dateStr);
      var year = date.getFullYear();
      var week = Math.ceil((date.getDate() + new Date(year, date.getMonth(), 1).getDay()) / 7);
      var label = year + '-W' + String(week).padStart(2,'0');
      byWeek[label] = (byWeek[label] || 0) + 1;
    });
    var entries = Object.entries(byWeek).sort(function(a,b){ return a[0].localeCompare(b[0]); });

    if(!entries.length){
      ctx.parentElement.innerHTML = '<h4>Collection growth</h4><p style="font-size:12.5px;color:var(--text3);">No creation dates recorded yet.</p>';
      return;
    }

    ctx.chartInstance = new window.Chart(ctx, {
      type: 'line',
      data: {
        labels: entries.map(function(d){ return d[0]; }),
        datasets: [{
          label: 'Collections Created',
          data: entries.map(function(d){ return d[1]; }),
          borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)',
          borderWidth: 2, fill: true, tension: 0.3,
          pointBackgroundColor: '#10b981', pointBorderColor: '#ffffff', pointRadius: 4, pointHoverRadius: 6
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: { legend: { display: true, labels: { color: '#ffffff', font: { size: 12 }, padding: 12 } } },
        scales: {
          y: { beginAtZero: true, ticks: { color: '#ffffff' }, grid: { color: 'rgba(255,255,255,0.1)' } },
          x: { ticks: { color: '#ffffff', autoSkip: true, maxRotation: 45 }, grid: { display: false } }
        }
      }
    });
  },

  renderSyncActivityChart(syncHistory){
    var ctx = el('syncActivityChartCanvas');
    if(!ctx || !window.Chart) return;
    if(ctx.chartInstance) ctx.chartInstance.destroy();

    var byDay = {};
    (syncHistory||[]).filter(function(s){ return !s.dryRun; }).forEach(function(s){
      var day = (s.timestamp||'').slice(0,10);
      if(!day) return;
      if(!byDay[day]) byDay[day] = { added:0, removed:0 };
      byDay[day].added += s.totalAddedToEmby||0;
      byDay[day].removed += s.totalRemovedFromEmby||0;
    });
    var days = Object.keys(byDay).sort();

    if(!days.length){
      ctx.parentElement.innerHTML = '<h4>Sync activity</h4><p style="font-size:12.5px;color:var(--text3);">No sync runs recorded yet.</p>';
      return;
    }

    var added = days.map(function(d){ return byDay[d].added; });
    var removed = days.map(function(d){ return -byDay[d].removed; });
    var net = []; var running = 0;
    days.forEach(function(d){ running += byDay[d].added - byDay[d].removed; net.push(running); });

    ctx.chartInstance = new window.Chart(ctx, {
      data: {
        labels: days,
        datasets: [
          { type:'bar', label:'Added to Emby', data:added, backgroundColor:'#378ADD', borderRadius:3, yAxisID:'y', stack:'changes' },
          { type:'bar', label:'Removed from Emby', data:removed, backgroundColor:'#D85A30', borderRadius:3, yAxisID:'y', stack:'changes' },
          { type:'line', label:'Net collection size', data:net, borderColor:'#639922', backgroundColor:'#639922', borderWidth:2, tension:0.3, pointRadius:3, yAxisID:'y1' }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: { legend: { display: true, labels: { color: '#ffffff', font: { size: 12 }, padding: 12 } } },
        scales: {
          y: { position:'left', ticks:{color:'#ffffff'}, grid:{color:'rgba(255,255,255,0.1)'}, title:{display:true,text:'Per day',color:'#ffffff'} },
          y1: { position:'right', beginAtZero:true, grid:{drawOnChartArea:false}, ticks:{color:'#ffffff'}, title:{display:true,text:'Cumulative',color:'#ffffff'} },
          x: { ticks:{color:'#ffffff', autoSkip:true, maxRotation:45}, grid:{color:'rgba(255,255,255,0.1)'} }
        }
      }
    });
  }
};

function loadChartLibrary(){
  return new Promise(function(resolve, reject){
    if(window.Chart){ resolve(); return; }
    var script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';
    script.onload = function(){ resolve(); };
    script.onerror = reject;
    document.head.appendChild(script);
  });
}

async function doPlaylistRefresh(plId, franchiseTitles, franchiseName){
  // Refresh an existing playlist: add new library movies + reorder chronologically
  var userId = getEmbySettings().userId;
  var newlyAdded = [], reordered = [];

  try {
    // Show progress modal
    var progressModal = el('playlistRefreshProgressModal') || document.createElement('div');
    progressModal.id = 'playlistRefreshProgressModal';
    progressModal.className = 'settings-modal-bg open';
    progressModal.innerHTML = 
      '<div class="settings-modal" style="max-width:500px;">' +
        '<div class="modal-header"><h3>Refreshing ' + esc(franchiseName) + '…</h3></div>' +
        '<div style="padding:15px;">' +
          '<div class="progress-wrap" id="refProgressWrap">' +
            '<div class="progress-bar-bg"><div class="progress-bar" id="refProgressBar" style="width:0%"></div></div>' +
            '<div class="progress-label" id="refProgressLabel">Starting…</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    if(!el('playlistRefreshProgressModal')){
      document.body.appendChild(progressModal);
    } else {
      el('playlistRefreshProgressModal').innerHTML = progressModal.innerHTML;
    }
    el('playlistRefreshProgressModal').classList.add('open');

    var setProgress = function(pct, msg){
      if(el('refProgressBar')) el('refProgressBar').style.width = pct + '%';
      if(el('refProgressLabel')) el('refProgressLabel').textContent = msg;
    };

    setProgress(5, 'Loading current playlist…');
    
    // 1. Get current playlist items
    var plData = await apiGet('/Playlists/' + plId + '/Items?UserId=' + userId + '&Fields=Id,Name,ProductionYear,PremiereDate,PlaylistItemId');
    var current = (plData && plData.Items) || [];
    var currentIds = current.map(function(c){ return c.Id; });
    var currentByTitle = {};
    current.forEach(function(c){ currentByTitle[c.Name] = c; });

    setProgress(20, 'Scanning library for new movies…');

    // 2. Get ALL movies from library
    var allLibMovies = await apiGet('/Items?IncludeItemTypes=Movie&Recursive=true&Fields=Id,Name,ProductionYear,PremiereDate&Limit=10000&UserId=' + userId);
    var allMovies = (allLibMovies && allLibMovies.Items) || [];
    var moviesByTitle = {};
    allMovies.forEach(function(m){
      moviesByTitle[m.Name] = m;
    });

    setProgress(40, 'Matching franchise titles…');

    // 3. Find new movies to add
    var moviesToAdd = [];
    franchiseTitles.forEach(function(title){
      var movie = moviesByTitle[title];
      if(movie && currentIds.indexOf(movie.Id) === -1){
        moviesToAdd.push(movie);
        newlyAdded.push(movie);
      }
    });

    if(moviesToAdd.length > 0){
      setProgress(50, 'Adding ' + moviesToAdd.length + ' new movies…');
      var addIds = moviesToAdd.map(function(m){ return m.Id; });
      await apiPost('/Playlists/' + plId + '/Items?UserId=' + userId + '&Ids=' + addIds.join(','), null);
    }

    setProgress(60, 'Re-fetching playlist…');

    // 4. Re-fetch updated playlist
    var plData2 = await apiGet('/Playlists/' + plId + '/Items?UserId=' + userId + '&Fields=Id,Name,ProductionYear,PremiereDate,PlaylistItemId');
    var updated = (plData2 && plData2.Items) || [];

    setProgress(70, 'Reordering ' + updated.length + ' movies chronologically…');

    // 5. Reorder based on franchise titles sequence + year sort for unmatched
    var ordered = [], unmatched = [];
    franchiseTitles.forEach(function(title){
      var m = updated.find(function(item){ return item.Name === title; });
      if(m && ordered.indexOf(m) === -1) ordered.push(m);
    });
    updated.forEach(function(item){
      if(ordered.indexOf(item) === -1) unmatched.push(item);
    });
    unmatched.sort(function(a,b){ return ((a.ProductionYear||9999) - (b.ProductionYear||9999)); });
    var final = ordered.concat(unmatched);

    // 6. Move each item to correct index
    for(var i = 0; i < final.length; i++){
      setProgress(70 + Math.round((i/final.length)*28), 'Ordering: ' + esc(final[i].Name) + '…');
      await apiPost('/Playlists/' + plId + '/Items/' + final[i].PlaylistItemId + '/Move/' + i, null);
      reordered.push(final[i]);
    }

    setProgress(100, 'Complete!');

    // Show results modal
    setTimeout(function(){
      el('playlistRefreshProgressModal').classList.remove('open');
      
      var diffModal = el('playlistRefreshDiffModal') || document.createElement('div');
      diffModal.id = 'playlistRefreshDiffModal';
      diffModal.className = 'settings-modal-bg open';
      
      var diffHtml = '<div class="refresh-diff-summary">' +
        '<div class="refresh-diff-stat added"><div class="rds-num">+' + newlyAdded.length + '</div><div class="rds-label">Added</div></div>' +
        '<div class="refresh-diff-stat reordered"><div class="rds-num">' + final.length + '</div><div class="rds-label">Total</div></div>' +
      '</div>';

      if(newlyAdded.length){
        diffHtml += '<h4 style="font-size:12px;margin:10px 0 8px;color:var(--text2);">New movies added:</h4><div class="refresh-diff-changes">';
        newlyAdded.forEach(function(m){
          diffHtml += '<div class="refresh-diff-row added">' +
            '<div class="rdr-icon">+</div>' +
            '<div class="rdr-title">' + esc(m.Name) + (m.ProductionYear ? ' (' + m.ProductionYear + ')' : '') + '</div>' +
          '</div>';
        });
        diffHtml += '</div>';
      }

      if(unmatched.length){
        diffHtml += '<h4 style="font-size:12px;margin:10px 0 8px;color:var(--text2);">Unmatched movies (sorted by year):</h4><div class="refresh-diff-changes">';
        unmatched.slice(0, 8).forEach(function(m){
          diffHtml += '<div class="refresh-diff-row reordered">' +
            '<div class="rdr-icon">↔</div>' +
            '<div class="rdr-title">' + esc(m.Name) + (m.ProductionYear ? ' (' + m.ProductionYear + ')' : '') + '</div>' +
          '</div>';
        });
        if(unmatched.length > 8) diffHtml += '<div style="padding:8px;text-align:center;color:var(--text3);font-size:11px;">…and ' + (unmatched.length-8) + ' more</div>';
        diffHtml += '</div>';
      }

      diffModal.innerHTML = 
        '<div class="settings-modal" style="max-width:500px;max-height:70vh;overflow-y:auto;">' +
          '<div class="modal-header">' +
            '<h3>' + esc(franchiseName) + ' — refresh complete</h3>' +
            '<button class="modal-close" onclick="el(\'playlistRefreshDiffModal\').classList.remove(\'open\')" style="position:absolute;top:10px;right:10px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;">&times;</button>' +
          '</div>' +
          '<div style="padding:15px;">' + diffHtml + '</div>' +
          '<div style="padding:10px 15px;border-top:1px solid var(--border);">' +
            '<button class="btn btn-secondary" style="width:100%;" onclick="el(\'playlistRefreshDiffModal\').classList.remove(\'open\')">Done</button>' +
          '</div>' +
        '</div>';
      
      if(!el('playlistRefreshDiffModal')){
        document.body.appendChild(diffModal);
      } else {
        el('playlistRefreshDiffModal').innerHTML = diffModal.innerHTML;
      }
      el('playlistRefreshDiffModal').classList.add('open');

      var msg = 'Refreshed ' + esc(franchiseName) + ': ' + final.length + ' movies total' + 
        (newlyAdded.length ? ', +' + newlyAdded.length + ' new' : '');
      toast(msg, 'ok');
    }, 500);

  } catch(e){
    el('playlistRefreshProgressModal').classList.remove('open');
    console.error('Playlist refresh error:', e);
    toast('Refresh failed: ' + e.message, 'err');
  }
}

/* ---------- Create a new Emby playlist from a franchise's title list ----------
   Scans the library for each title, creates the playlist seeded with whatever
   matched, then moves items into franchise order. Mirrors doPlaylistRefresh's
   progress-modal pattern above but uses its own modal ids so the two don't
   collide if somehow triggered back to back. */
async function doCreatePlaylist(playlistName, franchiseTitles, franchiseName){
  var userId = getEmbySettings().userId;
  var matched = [], missing = [];

  try {
    var progressModal = el('playlistCreateProgressModal') || document.createElement('div');
    progressModal.id = 'playlistCreateProgressModal';
    progressModal.className = 'settings-modal-bg open';
    progressModal.innerHTML =
      '<div class="settings-modal" style="max-width:500px;">' +
        '<div class="modal-header"><h3>Creating "' + esc(playlistName) + '"…</h3></div>' +
        '<div style="padding:15px;">' +
          '<div class="progress-wrap" id="createProgressWrap">' +
            '<div class="progress-bar-bg"><div class="progress-bar" id="createProgressBar" style="width:0%"></div></div>' +
            '<div class="progress-label" id="createProgressLabel">Starting…</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    if(!el('playlistCreateProgressModal')){
      document.body.appendChild(progressModal);
    } else {
      el('playlistCreateProgressModal').innerHTML = progressModal.innerHTML;
    }
    el('playlistCreateProgressModal').classList.add('open');

    var setProgress = function(pct, msg){
      if(el('createProgressBar')) el('createProgressBar').style.width = pct + '%';
      if(el('createProgressLabel')) el('createProgressLabel').textContent = msg;
    };

    setProgress(10, 'Scanning library for "' + franchiseName + '" titles…');

    // 1. Pull the whole movie library and match by exact title (same
    //    matching approach doPlaylistRefresh already uses above)
    var allLibMovies = await apiGet('/Items?IncludeItemTypes=Movie&Recursive=true&Fields=Id,Name,ProductionYear,PremiereDate&Limit=10000&UserId=' + userId);
    var allMovies = (allLibMovies && allLibMovies.Items) || [];
    var moviesByTitle = {};
    allMovies.forEach(function(m){ moviesByTitle[m.Name] = m; });

    franchiseTitles.forEach(function(title){
      var m = moviesByTitle[title];
      if(m) matched.push(m); else missing.push(title);
    });

    if(!matched.length){
      el('playlistCreateProgressModal').classList.remove('open');
      toast('None of the "' + esc(franchiseName) + '" titles were found in your library', 'err');
      return null;
    }

    setProgress(40, 'Creating playlist with ' + matched.length + ' movie(s)…');

    // 2. Create the actual Emby playlist, seeded with the matched items
    var matchedIds = matched.map(function(m){ return m.Id; });
    var createResp = await apiPost('/Playlists?Name=' + encodeURIComponent(playlistName) + '&Ids=' + matchedIds.join(',') + '&UserId=' + userId, null);
    var newPlaylistId = createResp && (createResp.Id || createResp.id);
    if(!newPlaylistId){
      throw new Error('Emby did not return a playlist Id');
    }

    setProgress(70, 'Ordering ' + matched.length + ' movies chronologically…');

    // 3. Fetch it back to get PlaylistItemIds, then move each into franchise order
    var plData = await apiGet('/Playlists/' + newPlaylistId + '/Items?UserId=' + userId + '&Fields=Id,Name,PlaylistItemId');
    var items = (plData && plData.Items) || [];
    var itemsByEmbyId = {};
    items.forEach(function(i){ itemsByEmbyId[i.Id] = i; });

    for(var i = 0; i < matched.length; i++){
      setProgress(70 + Math.round((i/matched.length)*28), 'Ordering: ' + esc(matched[i].Name) + '…');
      var embyItem = itemsByEmbyId[matched[i].Id];
      if(embyItem){
        await apiPost('/Playlists/' + newPlaylistId + '/Items/' + embyItem.PlaylistItemId + '/Move/' + i, null);
      }
    }

    setProgress(100, 'Complete!');

    setTimeout(function(){
      el('playlistCreateProgressModal').classList.remove('open');
      var msg = '✓ Created "' + playlistName + '" — ' + matched.length + ' movie(s)' +
        (missing.length ? ', ' + missing.length + ' not in library' : '');
      toast(msg, 'ok');
    }, 400);

    return { id: newPlaylistId, name: playlistName, matched: matched, missing: missing };

  } catch(e){
    if(el('playlistCreateProgressModal')) el('playlistCreateProgressModal').classList.remove('open');
    console.error('Playlist create error:', e);
    toast('Create failed: ' + e.message, 'err');
    return null;
  }
}


/* ---------- Hover preview — first 10 item posters, lazy-fetched on hover
   (same reasoning the original app used: avoid fetching images for every
   row on initial render, only do it on demand) ---------- */
const HoverPreview = {
  cache: {},

  async show(embyId, e){
    if(!embyId){ 
      // For pending schedules with no collection yet, show a message instead of silently failing
      var popup = el('hoverPreview');
      var rect = e.currentTarget.getBoundingClientRect();
      popup.style.top = (rect.bottom + 6) + 'px';
      popup.style.left = rect.left + 'px';
      popup.innerHTML = '<div class="loading">No collection yet — run the schedule first</div>';
      popup.classList.add('show');
      return;
    }
    var popup = el('hoverPreview');
    var rect = e.currentTarget.getBoundingClientRect();
    popup.style.top = (rect.bottom + 6) + 'px';
    popup.style.left = rect.left + 'px';

    if(this.cache[embyId]){
      this.render(this.cache[embyId]);
      popup.classList.add('show');
      return;
    }

    popup.innerHTML = '<div class="loading">Loading…</div>';
    popup.classList.add('show');
    try{
      var r = await fetch('/api/collections/' + embyId + '/items?limit=10');
      var data = await r.json();
      var items = (data.success && data.items) || [];
      this.cache[embyId] = items;
      this.render(items);
    } catch(e2){
      popup.innerHTML = '<div class="loading">Could not load preview</div>';
    }
  },

  render(items){
    var popup = el('hoverPreview');
    if(!items.length){ popup.innerHTML = '<div class="loading">No items</div>'; return; }
    var cols = items.length <= 5 ? items.length : Math.ceil(items.length / 2);
    popup.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
    popup.innerHTML = items.map(function(it){
      return '<img src="' + esc(it.imagePath||'') + '" title="' + esc(it.name) + '" onerror="this.style.opacity=0.2;">';
    }).join('');
  },

  hide(){ el('hoverPreview').classList.remove('show'); }
};

/* ---------- Collection Detail panel — replaces jumping straight to Emby.
   Shows the actual item grid, missing titles, and (for Trakt/MDBlists
   collections) the per-collection Radarr auto-send toggle. ---------- */
const DetailPanel = {
  row: null,
  selected: null,
  servers: [],
  missingPosters: {},
  lastItems: [],
  _pendingDeletes: {},  // Track pending deletes for undo: {embyId:itemId: true/false}

  // Lets the row menu (which only has an embyId, not an index) open the same
  // detail view as clicking the name directly — one of three paths into this
  openByEmbyId(embyId){
    var idx = (CollectionList._currentRows || []).findIndex(function(r){ return r.embyId === embyId; });
    if(idx === -1){ toast('Could not find that item in the current list', 'err'); return; }
    this.open(idx);
  },

  async open(idx){
    this.row = CollectionList._currentRows[idx];
    var row = this.row;
    var kindLabel = row.kind === 'playlist' ? 'Playlist' : 'Collection';

    el('detailModalTitle').textContent = row.name;
    el('detailModalBg').classList.add('open');
    el('detailModalBody').innerHTML = '<div class="preview-box">Loading items…</div>';
    el('detailModalFoot').innerHTML = '';

    if(!row.embyId){
      el('detailModalBody').innerHTML = '<div class="empty-state"><p>This schedule hasn\'t created a ' + kindLabel.toLowerCase() + ' yet — run it first.</p></div>';
      return;
    }

    var missing = row.raw.missingTitles || [];
    // Only initialize selected on first open, don't reset it if already set
    if(!this.selected) {
      this.selected = new Set(missing); // all ticked by default
    }

    try{
      var calls = [fetch('/api/collections/' + row.embyId + '/items?limit=500')];
      if(missing.length){
        calls.push(fetch('/api/radarr/servers'));
        calls.push(fetch('/api/tmdb/posters', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({titles:missing}) }));
      }
      var results = await Promise.all(calls);
      var data = await results[0].json();
      var items = (data.success && data.items) || [];

      if(missing.length){
        var serversData = await results[1].json();
        this.servers = (serversData.success && serversData.servers) || [];
        var postersData = await results[2].json();
        this.missingPosters = (postersData.success && postersData.posters) || {};
        this.posterDiagnostic = postersData.success ? { found: postersData.foundCount||0, failed: postersData.failedCount||0 } : { error: postersData.error };
      } else {
        this.servers = [];
        this.missingPosters = {};
        this.posterDiagnostic = null;
      }

      this.lastItems = items;
      this.render(items);
    } catch(e){
      el('detailModalBody').innerHTML = '<div class="preview-box" style="color:var(--danger);">' + esc(e.message) + '</div>';
    }
  },

  render(items){
    var row = this.row;
    var missing = (row.raw.missingTitles || []);
    var isSourced = row.source === 'Trakt' || row.source === 'MDBlists';
    var kindLabel = row.kind === 'playlist' ? 'Playlist' : 'Collection';
    var self = this;

    var grid = items.map(function(it){
      var canDelete = row.source !== 'Trakt' && row.source !== 'MDBlists';
      var deleteBtn = canDelete 
        ? '<button class="del-btn" title="Delete from collection" data-item-id="' + esc(it.id) + '" data-item-name="' + esc(it.name) + '" onclick="event.stopPropagation(); DetailPanel.deleteItem(this.dataset.itemId, this.dataset.itemName)">✕</button>'
        : '';
      return '<div class="detail-item" style="position:relative;">' + deleteBtn + '<img src="' + esc(it.imagePath||'') + '" onerror="this.style.opacity=0.2;"><span class="t">' + esc(it.name) + '</span></div>';
    }).join('') + missing.map(function(t){
      var poster = self.missingPosters[t];
      var checked = self.selected.has(t);
      return '<div class="detail-item missing" style="position:relative;">' +
        '<input type="checkbox" ' + (checked?'checked':'') + ' onchange="DetailPanel.toggleMissing(' + JSON.stringify(t) + ', this.checked)" style="position:absolute;top:3px;left:3px;z-index:2;" onclick="event.stopPropagation();">' +
        '<img src="' + esc(poster||'') + '" onerror="this.style.opacity=0.15;" style="cursor:pointer;" onclick="DetailPanel.sendOneMissing(' + JSON.stringify(t) + ')" title="Click the poster to send just this one to Radarr">' +
        '<span class="t" style="color:var(--warn);">' + esc(t) + '</span>' +
      '</div>';
    }).join('');

    var radarrToggle = isSourced
      ? '<div class="toggle-row" style="margin-top:14px;"><div class="label"><b>Auto-send missing to Radarr</b><span>Applies during scheduled list sync</span></div>' +
        '<label class="switch"><input type="checkbox" ' + (row.raw.radarrAutoSend?'checked':'') + ' onchange="DetailPanel.toggleRadarrAutoSend(this.checked)"><span class="track"><span class="knob"></span></span></label></div>'
      : '';

    var radarrSection = '';
    if(missing.length){
      var configured = this.servers.filter(function(s){ return s.configured; });
      var serverOptions = configured.length
        ? configured.map(function(s){ return '<option value="' + s.id + '">' + esc(s.name) + '</option>'; }).join('')
        : '<option value="">No Radarr server configured</option>';

      var posterNote = '';
      if(this.posterDiagnostic){
        if(this.posterDiagnostic.error){
          posterNote = '<p style="font-size:11px;color:var(--danger);margin:0 0 8px;">Poster lookup failed: ' + esc(this.posterDiagnostic.error) + '</p>';
        } else if(this.posterDiagnostic.found === 0 && missing.length > 0){
          posterNote = '<p style="font-size:11px;color:var(--warn);margin:0 0 8px;">No TMDB posters found for any missing title — check the terminal log or test the TMDB connection in Settings.</p>';
        }
      }

      radarrSection = '<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);">' +
        posterNote +
        '<p style="font-size:12px;color:var(--text2);margin:0 0 8px;">' + missing.length + ' missing from this ' + kindLabel.toLowerCase() + ' — tick/untick which to send, or click a poster to send just that one</p>' +
        '<div class="field-row"><div class="field"><label>Radarr server</label><select id="detailRadarrServer">' + serverOptions + '</select></div></div>' +
        '<div style="display:flex;gap:8px;align-items:center;">' +
          '<button class="btn btn-secondary" style="font-size:11px;padding:5px 10px;" onclick="DetailPanel.selectAllMissing(true)">Select all</button>' +
          '<button class="btn btn-secondary" style="font-size:11px;padding:5px 10px;" onclick="DetailPanel.selectAllMissing(false)">Select none</button>' +
          '<button class="btn btn-primary" style="font-size:11px;padding:5px 10px;margin-left:auto;" onclick="DetailPanel.sendSelectedMissing()">Send Selected to Radarr</button>' +
        '</div>' +
      '</div>';
    }

    el('detailModalBody').innerHTML =
      '<p style="font-size:12px;color:var(--text3);margin:0 0 4px;">' + items.length + ' in this ' + kindLabel.toLowerCase() + (missing.length ? ', ' + missing.length + ' missing' : '') + '</p>' +
      '<div class="detail-grid">' + grid + '</div>' +
      radarrToggle +
      radarrSection;

    el('detailModalFoot').innerHTML =
      '<div style="display:flex;gap:8px;">' +
        '<button class="btn btn-secondary" onclick="openCollectionInEmby(' + "'" + row.embyId + "'" + ')">Open in Emby</button>' +
        '<button class="btn btn-danger" onclick="RowActions.deleteCollection(' + "'" + row.embyId + "'" + ');DetailPanel.close();">Delete</button>' +
      '</div>';
  },

  toggleMissing(title, checked){
    if(checked) this.selected.add(title);
    else this.selected.delete(title);
  },

  selectAllMissing(on){
    var missing = this.row.raw.missingTitles || [];
    this.selected = on ? new Set(missing) : new Set();
    this.render(this.lastItems);
  },

  getDetailServerId(){
    var select = el('detailRadarrServer');
    if(!select || select.value === ''){ toast('Select a configured Radarr server first', 'warn'); return null; }
    return parseInt(select.value, 10);
  },

  async sendOneMissing(title){
    var serverId = this.getDetailServerId();
    if(serverId === null) return;
    await this._sendMissing([title], serverId);
  },

  async sendSelectedMissing(){
    var titles = Array.from(this.selected);
    if(!titles.length){ toast('Nothing selected', 'warn'); return; }
    var serverId = this.getDetailServerId();
    if(serverId === null) return;
    await this._sendMissing(titles, serverId);
  },

  async _sendMissing(titles, serverId){
    toast('Sending ' + titles.length + ' title(s) to Radarr…', 'inf');
    try{
      var r = await fetch('/api/radarr/send', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ titles: titles, radarrServerId: serverId })
      });
      var result = await r.json();
      if(!result.success){ toast('Send failed: ' + (result.error||'Unknown error'), 'err'); return; }
      toast('✓ Sent ' + result.sent + ' of ' + result.total + ' to Radarr', 'ok');
    } catch(e){ toast('Send request failed: ' + e.message, 'err'); }
  },

  async deleteItem(itemId, itemName){
    var row = this.row;
    var embyId = row.embyId;
    if(!itemId || !embyId) return;

    // Only allow deletion from non-external sources
    if(row.source === 'Trakt' || row.source === 'MDBlists'){
      toast('Remove from the source list on ' + row.source + ' instead — resync will pull it back', 'warn');
      return;
    }

    var self = this;
    var deleteKey = embyId + ':' + itemId;
    this._pendingDeletes[deleteKey] = true;  // Mark as pending (not yet executed)

    // Show undo toast with 5-second window
    var undoLink = '<a href="#" onclick="event.preventDefault(); DetailPanel._undoDelete(\'' + esc(itemId).replace(/'/g, "\\'") + '\', \'' + esc(itemName).replace(/'/g, "\\'") + '\', \'' + esc(embyId).replace(/'/g, "\\'") + '\'); return false;">Undo</a>';
    toast('Deleted "' + esc(itemName) + '" — ' + undoLink, 'warn', 5000);

    // Remove from current display immediately
    this.lastItems = this.lastItems.filter(function(i){ return i.id !== itemId; });
    this.render(this.lastItems);

    // After 5 seconds, if not undone, actually delete
    setTimeout(async function(){
      if(!self._pendingDeletes[deleteKey]) return; // Was undone
      delete self._pendingDeletes[deleteKey];  // No longer pending
      
      try{
        var r = await fetch('/api/collections/' + embyId + '/items', {
          method:'DELETE', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ ids: [itemId] })
        });
        console.log('Delete response:', r.status, r.statusText);
        var result = await r.json();
        console.log('Delete result:', JSON.stringify(result));
        if(!r.ok) {
          console.error('Delete error:', result);
          return;
        }

        // Update localStorage with backend's updated titles
        var stored = JSON.parse(localStorage.getItem('cp_saved_collections') || '[]');
        var idx = stored.findIndex(function(c){ return c.embyId === embyId; });
        console.log('Found collection at index:', idx, 'has updatedTitles:', !!result.updatedTitles);
        if(idx > -1 && result.updatedTitles){
          stored[idx].originalTitles = result.updatedTitles;
          stored[idx].itemCount = result.itemCount;
          localStorage.setItem('cp_saved_collections', JSON.stringify(stored));
          console.log('✓ Updated localStorage:', stored[idx]);
        }

        console.log('✓ Item deleted permanently');
        
        // Refresh collection list to show updated itemCount
        CollectionList.render();
      } catch(e){ console.error('Delete failed:', e.message); }
    }, 5000);
  },

  async _undoDelete(itemId, itemName, embyId){
    var deleteKey = embyId + ':' + itemId;
    delete this._pendingDeletes[deleteKey];  // Mark as undone (don't execute deletion)
    
    try{
      var r = await fetch('/api/collections/' + embyId + '/items', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ids: [itemId] })
      });
      if(r.ok){
        toast('Restored "' + esc(itemName) + '"', 'ok');
        var rowIdx = CollectionList._currentRows.findIndex(function(r){ return r.embyId === embyId; });
        if(rowIdx > -1) DetailPanel.open(rowIdx);
      }
    } catch(e){ toast('Undo failed: ' + e.message, 'err'); }
  },

  async toggleRadarrAutoSend(checked){
    // Update localStorage (source of truth for the frontend) and push to the
    // backend's chrono-collections.json — without this second step, the
    // scheduled sync would never see the change, since it reads its own copy.
    try{
      var stored = JSON.parse(localStorage.getItem('cp_saved_collections') || '[]');
      var idx = stored.findIndex(function(c){ return c.embyId === DetailPanel.row.embyId; });
      if(idx > -1){
        stored[idx].radarrAutoSend = checked;
        localStorage.setItem('cp_saved_collections', JSON.stringify(stored));
        await fetch('/api/chrono/sync-metadata', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({collections:stored}) });
        toast(checked ? '✓ Radarr auto-send enabled' : 'Radarr auto-send disabled', 'ok');
      }
    } catch(e){ toast('Could not save: ' + e.message, 'err'); }
  },

  close(){ el('detailModalBg').classList.remove('open'); }
};

/* ---------- Init ---------- */
document.addEventListener('DOMContentLoaded', async function(){
  // Restore source filters from localStorage
  var savedFilters = localStorage.getItem('activeSourceFilters');
  if(savedFilters){
    try{
      var filters = JSON.parse(savedFilters);
      activeSourceFilters.clear();
      filters.forEach(f => activeSourceFilters.add(f));
    } catch(e){ console.warn('Could not restore filters:', e); }
  }
  
  await loadAppConfig();
  await AppData.loadAll();
  renderSourceFilter();
  renderSidebarStatus();
  CollectionList.render();
});
</script>
