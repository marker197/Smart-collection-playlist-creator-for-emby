<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<title>Emby Playlist Manager</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<style>
/* ═══════════════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════════════ */
:root{
  --bg:#15151a;
  --surface:#1d1d24;
  --surface2:#26262f;
  --surface3:#2f2f3a;
  --border:#36363f;
  --border2:#44444f;
  --text:#f0f0f3;
  --text2:#b8b8c4;
  --text3:#7a7a86;
  --accent:#6c6bff;
  --accent-hover:#7d7cff;
  --success:#2fb673;
  --danger:#ef5350;
  --warn:#e8a33d;
  --radius:8px;
  --radius-lg:12px;

  /* Source identity colors — the one signature system used everywhere
     a collection appears: sidebar counts, list rows, detail panes */
  --src-trakt:#ed4245;
  --src-mdblists:#2ec5c5;
  --src-smart:#6c6bff;
  --src-playlist:#f0a830;
  --src-emby:#8a8f98;

  --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --font-data: "SF Mono", "JetBrains Mono", "Consolas", monospace;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:14px;-webkit-font-smoothing:antialiased;}
body{overflow:hidden;height:100vh;}

::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:var(--text3);}

.mono{font-family:var(--font-data);font-feature-settings:"tnum";}

/* ═══════════════════════════════════════════════
   APP SHELL — sidebar + main
   ═══════════════════════════════════════════════ */
.shell{display:flex;height:100vh;width:100vw;}

/* ---------- SIDEBAR ---------- */
.sidebar{
  width:248px;flex-shrink:0;background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:18px 14px;
}
.sidebar-brand{display:flex;align-items:center;gap:9px;padding:0 4px 18px;margin-bottom:14px;border-bottom:1px solid var(--border);}
.sidebar-brand .logo{font-size:20px;}
.sidebar-brand h1{font-size:14px;font-weight:700;letter-spacing:.2px;margin:0;}
.sidebar-brand p{font-size:10px;color:var(--text3);margin:1px 0 0;text-transform:uppercase;letter-spacing:.6px;}

.sb-section{margin-bottom:18px;}
.sb-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);padding:0 8px;margin-bottom:6px;}

.sb-nav-btn{
  display:flex;align-items:center;gap:10px;width:100%;text-align:left;
  background:none;border:none;color:var(--text2);font-family:inherit;font-size:13px;font-weight:500;
  padding:8px 9px;border-radius:var(--radius);cursor:pointer;transition:background .12s,color .12s;
}
.sb-nav-btn:hover{background:var(--surface2);color:var(--text);}
.sb-nav-btn.active{background:var(--surface3);color:var(--text);}
.sb-nav-btn svg{flex-shrink:0;opacity:.85;}
.sb-nav-btn .kbd{margin-left:auto;font-size:10px;color:var(--text3);background:var(--surface3);padding:2px 5px;border-radius:4px;font-family:var(--font-data);}

.sb-create-btn{
  display:flex;align-items:center;justify-content:center;gap:7px;width:100%;
  background:var(--accent);color:#fff;border:none;font-family:inherit;font-weight:600;font-size:13px;
  padding:10px;border-radius:var(--radius);cursor:pointer;transition:background .12s;margin-bottom:4px;
}
.sb-create-btn:hover{background:var(--accent-hover);}

.sb-source-filter{display:flex;flex-direction:column;gap:2px;}
.sb-source-row{
  display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius);
  cursor:pointer;font-size:12.5px;color:var(--text2);transition:background .12s;
}
.sb-source-row:hover{background:var(--surface2);}
.sb-source-row.disabled{opacity:.35;}
.sb-source-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sb-source-row .cnt{margin-left:auto;font-family:var(--font-data);font-size:11px;color:var(--text3);}

.sb-status{margin-top:auto;border-top:1px solid var(--border);padding-top:14px;}
.sb-status-row{display:flex;align-items:center;justify-content:space-between;font-size:11.5px;color:var(--text3);padding:3px 8px;}
.sb-status-row b{color:var(--text2);font-family:var(--font-data);font-weight:600;}
.sb-health-dot{width:7px;height:7px;border-radius:50%;background:var(--success);flex-shrink:0;display:inline-block;}
.sb-health-dot.bad{background:var(--danger);}
.sb-sync-now-btn{
  width:100%;margin-top:8px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);
  font-family:inherit;font-size:12px;font-weight:500;padding:7px;border-radius:var(--radius);cursor:pointer;
  transition:background .12s,border-color .12s;
}
.sb-sync-now-btn:hover{background:var(--surface3);border-color:var(--accent);color:var(--text);}

/* ---------- MAIN ---------- */
.main{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden;}

.main-header{
  flex-shrink:0;display:flex;align-items:center;gap:12px;
  padding:16px 24px;border-bottom:1px solid var(--border);
}
.main-header h2{font-size:16px;font-weight:700;margin:0;flex-shrink:0;}
.search-box{
  flex:1;max-width:360px;display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  padding:7px 10px;color:var(--text3);
}
.search-box input{background:none;border:none;color:var(--text);font-family:inherit;font-size:13px;flex:1;outline:none;}
.search-box input::placeholder{color:var(--text3);}

.sort-select{
  background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-family:inherit;
  font-size:12.5px;padding:7px 10px;border-radius:var(--radius);cursor:pointer;outline:none;
}

.main-body{flex:1;overflow-y:auto;padding:0 24px 24px;}

/* ═══════════════════════════════════════════════
   BUILDER PANEL (collapsible "create" area)
   ═══════════════════════════════════════════════ */
.builder-panel{
  margin-top:18px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);
  overflow:hidden;max-height:0;opacity:0;transition:max-height .25s ease, opacity .2s ease;
}
.builder-panel.open{max-height:640px;opacity:1;}
.builder-head{
  display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border);
  background:var(--surface2);
}
.builder-head h3{font-size:13.5px;font-weight:700;margin:0;flex:1;}
.builder-mode-tabs{display:flex;gap:4px;}
.builder-mode-tab{
  background:none;border:none;color:var(--text3);font-family:inherit;font-size:12px;font-weight:600;
  padding:6px 11px;border-radius:var(--radius);cursor:pointer;transition:background .12s,color .12s;
}
.builder-mode-tab:hover{color:var(--text2);}
.builder-mode-tab.active{background:var(--accent);color:#fff;}
.builder-close{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;display:flex;}
.builder-close:hover{color:var(--text);}
.builder-content{padding:18px;max-height:520px;overflow-y:auto;}

/* ═══════════════════════════════════════════════
   COLLECTION LIST (the core, dense, scannable view)
   ═══════════════════════════════════════════════ */
.list-head{
  display:grid;grid-template-columns:28px 1fr 110px 90px 130px 36px;gap:14px;align-items:center;
  padding:9px 14px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);
  border-bottom:1px solid var(--border);margin-top:20px;
}
.sort-header{
  background:none;border:none;color:inherit;font:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:4px;
  padding:0;text-transform:inherit;letter-spacing:inherit;
}
.sort-header:hover{color:var(--text2);}
.sort-header .arrow{font-size:9px;opacity:0;transition:opacity .12s;}
.sort-header.active{color:var(--text2);}
.sort-header.active .arrow{opacity:1;color:var(--accent);}

.coll-row{
  display:grid;grid-template-columns:28px 1fr 110px 90px 130px 36px;gap:14px;align-items:center;
  padding:9px 14px;border-bottom:1px solid var(--border);position:relative;
  border-left:3px solid transparent;transition:background .1s;
}
.coll-row:hover{background:var(--surface);}
.coll-row.src-trakt{border-left-color:var(--src-trakt);}
.coll-row.src-mdblists{border-left-color:var(--src-mdblists);}
.coll-row.src-smart{border-left-color:var(--src-smart);}
.coll-row.src-playlist{border-left-color:var(--src-playlist);}
.coll-row.src-emby{border-left-color:var(--src-emby);}

.coll-thumb{width:28px;height:28px;border-radius:5px;background:var(--surface3);object-fit:cover;}
.coll-name{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;}
.coll-name:hover{color:var(--accent-hover);}
.coll-sub{font-size:11px;color:var(--text3);margin-top:1px;}

.src-badge{
  display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;padding:3px 7px;border-radius:5px;
  background:var(--surface2);white-space:nowrap;
}
.src-badge .dot{width:6px;height:6px;border-radius:50%;}
.src-badge.trakt{color:var(--src-trakt);}
.src-badge.mdblists{color:var(--src-mdblists);}
.src-badge.smart{color:var(--src-smart);}
.src-badge.playlist{color:var(--src-playlist);}
.src-badge.emby{color:var(--src-emby);}

.item-count{font-family:var(--font-data);font-size:12.5px;color:var(--text2);text-align:right;}
.item-count .missing{color:var(--warn);font-size:10.5px;display:block;margin-top:1px;}

.status-pill{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:10px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.status-pill.ok{background:rgba(47,182,115,.15);color:var(--success);}
.status-pill.warn{background:rgba(232,163,61,.15);color:var(--warn);}
.status-pill.idle{background:var(--surface2);color:var(--text3);}

.row-menu-btn{
  background:none;border:none;color:var(--text3);cursor:pointer;padding:5px;border-radius:5px;
  display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s;
}
.row-menu-btn:hover{background:var(--surface3);color:var(--text);}

/* ---------- row context menu (popup) ---------- */
.row-popup{
  position:fixed;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);
  box-shadow:0 12px 32px rgba(0,0,0,.45);min-width:190px;padding:5px;z-index:500;display:none;flex-direction:column;gap:1px;
}
.row-popup.open{display:flex;}
.row-popup button{
  display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:none;border:none;
  color:var(--text2);font-family:inherit;font-size:12.5px;padding:8px 9px;border-radius:6px;cursor:pointer;
  transition:background .1s,color .1s;
}
.row-popup button:hover{background:var(--surface3);color:var(--text);}
.row-popup button.danger:hover{background:rgba(239,83,80,.12);color:var(--danger);}
.row-popup hr{border:none;border-top:1px solid var(--border);margin:4px 2px;}

.empty-state{padding:60px 20px;text-align:center;color:var(--text3);}
.empty-state .icon{font-size:32px;margin-bottom:10px;opacity:.5;}
.empty-state p{font-size:13px;margin:0;}

/* ---------- small focused modal (Publish Settings, Radarr send) ---------- */
.mini-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:700;align-items:center;justify-content:center;}
.mini-modal-bg.open{display:flex;}
.mini-modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);width:420px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.mini-modal-head{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border);}
.mini-modal-head h3{font-size:13.5px;font-weight:700;margin:0;flex:1;}
.mini-modal-body{padding:18px;overflow-y:auto;}
.mini-modal-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.toggle-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.toggle-row:last-child{border-bottom:none;}
.toggle-row .label{flex:1;}
.toggle-row .label b{display:block;font-size:13px;color:var(--text);}
.toggle-row .label span{display:block;font-size:11px;color:var(--text3);margin-top:1px;}
.toggle-row a{color:var(--accent);text-decoration:none;font-size:11px;}
.switch{position:relative;width:36px;height:20px;flex-shrink:0;}
.switch input{opacity:0;width:0;height:0;}
.switch .track{position:absolute;inset:0;background:var(--surface3);border-radius:10px;cursor:pointer;transition:background .15s;}
.switch input:checked + .track{background:var(--accent);}
.switch .knob{position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .15s;}
.switch input:checked + .track .knob{transform:translateX(16px);}
.missing-list{max-height:160px;overflow-y:auto;margin:10px 0;}
.missing-item{display:flex;align-items:center;gap:8px;padding:6px 8px;font-size:12.5px;color:var(--text2);border-radius:6px;}
.missing-item:hover{background:var(--surface2);}

/* ---------- analytics ---------- */
.an-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.an-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
.an-card .v{font-family:var(--font-data);font-size:22px;font-weight:700;color:var(--text);}
.an-card .l{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}
.an-section{margin-bottom:20px;}
.an-section h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin:0 0 10px;}
.an-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px;font-size:12.5px;}
.an-bar-label{width:80px;flex-shrink:0;color:var(--text2);}
.an-bar-track{flex:1;height:8px;background:var(--surface3);border-radius:4px;overflow:hidden;}
.an-bar-fill{height:100%;border-radius:4px;}
.an-bar-count{width:36px;text-align:right;font-family:var(--font-data);color:var(--text3);flex-shrink:0;}
.an-list-item{display:flex;justify-content:space-between;padding:6px 0;font-size:12.5px;border-bottom:1px solid var(--border);}
.an-list-item:last-child{border-bottom:none;}
.an-list-item .n{font-family:var(--font-data);color:var(--text3);}

/* ---------- hover preview popup ---------- */
.hover-preview{
  position:fixed;display:none;grid-gap:3px;background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--radius);padding:8px;box-shadow:0 16px 40px rgba(0,0,0,.5);z-index:600;max-width:360px;
}
.hover-preview.show{display:grid;}
.hover-preview img{width:56px;height:84px;object-fit:cover;border-radius:4px;background:var(--surface3);}
.hover-preview .loading{font-size:11px;color:var(--text3);padding:6px;}

/* ---------- detail panel ---------- */
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:8px;margin-top:10px;}
.detail-item{display:flex;flex-direction:column;gap:4px;}
.detail-item img{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:5px;background:var(--surface3);}
.detail-item .t{font-size:10.5px;color:var(--text3);line-height:1.3;}
.detail-item.missing img{border:2px dashed var(--warn);background:var(--surface3);}
.detail-item.missing .t{color:var(--warn);}
.del-btn{position:absolute;top:4px;right:4px;z-index:3;width:24px;height:24px;padding:0;border:none;border-radius:50%;background:rgba(231,76,60,0.9);color:#fff;font-size:14px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 200ms;}
.del-btn:hover{background:rgba(231,76,60,1);}

/* ═══════════════════════════════════════════════
   SHARED FORM ELEMENTS (used inside builder panel)
   ═══════════════════════════════════════════════ */
.field-row{display:flex;gap:10px;margin-bottom:10px;}
.field{flex:1;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
.field input,.field select{
  width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:inherit;
  font-size:13px;padding:8px 10px;border-radius:var(--radius);outline:none;transition:border-color .12s;
}
.field input:focus,.field select:focus{border-color:var(--accent);}
.field textarea{
  width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-data);
  font-size:12.5px;padding:8px 10px;border-radius:var(--radius);outline:none;transition:border-color .12s;
  resize:vertical;min-height:120px;line-height:1.6;
}
.field textarea:focus{border-color:var(--accent);}
.field .hint{font-size:11px;color:var(--text3);margin-top:4px;}

.btn{
  display:inline-flex;align-items:center;gap:7px;font-family:inherit;font-size:12.5px;font-weight:600;
  padding:8px 14px;border-radius:var(--radius);cursor:pointer;border:1px solid transparent;transition:all .12s;
}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-hover);}
.btn-secondary{background:var(--surface2);color:var(--text2);border-color:var(--border);}
.btn-secondary:hover{background:var(--surface3);color:var(--text);}
.btn-danger{background:rgba(239,83,80,.12);color:var(--danger);}
.btn-danger:hover{background:rgba(239,83,80,.2);}
.btn:disabled{opacity:.5;cursor:not-allowed;}

.condition-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;background:var(--surface2);padding:8px;border-radius:var(--radius);}
.condition-row select,.condition-row input{background:var(--surface3);border:1px solid var(--border2);color:var(--text);font-family:inherit;font-size:12.5px;padding:6px 8px;border-radius:6px;}
.logic-pill{display:inline-flex;background:var(--surface2);border-radius:6px;padding:2px;}
.logic-pill button{background:none;border:none;color:var(--text3);font-family:inherit;font-size:11px;font-weight:700;padding:5px 10px;border-radius:5px;cursor:pointer;}
.logic-pill button.active{background:var(--accent);color:#fff;}

.preview-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-top:12px;font-size:12.5px;color:var(--text2);}
.preview-box .count{font-family:var(--font-data);font-weight:700;color:var(--text);font-size:14px;}
.preview-list{margin-top:8px;max-height:140px;overflow-y:auto;font-size:12px;color:var(--text3);}
.preview-list li{padding:2px 0;}


/* ═══════════════════════════════════════════════
   REFRESH PLAYLIST — diff modal & styles
   ═══════════════════════════════════════════════ */
.progress-wrap{margin-top:11px;}
.progress-bar-bg{background:var(--surface2);border-radius:99px;height:5px;overflow:hidden;margin-bottom:7px;}
.progress-bar{height:100%;background:var(--accent);border-radius:99px;width:0%;transition:width .3s;}
.progress-label{font-size:12px;color:var(--text2);}

.refresh-diff-summary{display:flex;gap:8px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.refresh-diff-stat{flex:1;background:var(--surface2);border-radius:var(--radius);padding:10px 12px;}
.refresh-diff-stat .rds-num{font-size:20px;font-weight:700;line-height:1;}
.refresh-diff-stat .rds-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-top:4px;}
.refresh-diff-stat.added .rds-num{color:var(--success);}
.refresh-diff-stat.reordered .rds-num{color:var(--accent);}
.refresh-diff-changes{display:flex;flex-direction:column;gap:6px;max-height:400px;overflow-y:auto;}
.refresh-diff-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;font-size:12px;}
.refresh-diff-row.added{background:#1a6a3a;background:rgba(47,182,115,.15);color:#58d084;}
.refresh-diff-row.reordered{background:rgba(108,107,255,.15);color:var(--accent);}
.refresh-diff-row .rdr-icon{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.refresh-diff-row.added .rdr-icon{background:var(--success);color:#fff;}
.refresh-diff-row.reordered .rdr-icon{background:var(--accent);color:#fff;}
.refresh-diff-row .rdr-title{flex:1;min-width:0;font-weight:500;}

#toastStack{position:fixed;bottom:20px;left:268px;z-index:9999;display:flex;flex-direction:column-reverse;gap:8px;}
.toast{background:var(--surface2);border:1px solid var(--border2);border-left:3px solid var(--accent);border-radius:var(--radius);padding:10px 14px;font-size:12.5px;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,.4);min-width:240px;}
.toast.ok{border-left-color:var(--success);}
.toast.err{border-left-color:var(--danger);}
.toast.warn{border-left-color:var(--warn);}

/* ═══════════════════════════════════════════════
   PLAYLIST EDITOR — reorder UI styles
   ═══════════════════════════════════════════════ */
.playlist-items-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;max-height:400px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);padding:8px;}
.playlist-item{display:flex;align-items:center;gap:8px;padding:10px;background:var(--surface2);border-radius:6px;cursor:move;transition:all .2s;border:1px solid transparent;}
.playlist-item:hover{background:var(--surface3);border-color:var(--border2);}
.playlist-item-drag-handle{flex-shrink:0;width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px;font-weight:700;cursor:grab;user-select:none;}
.playlist-item-drag-handle:active{cursor:grabbing;}
.playlist-item-info{flex:1;min-width:0;}
.playlist-item-title{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.playlist-item-controls{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.btn-icon{background:none;border:none;color:var(--text3);width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer;transition:all .15s;padding:0;}
.btn-icon:hover{background:var(--surface3);color:var(--text);}
.btn-icon.danger:hover{background:rgba(239,83,80,.15);color:var(--danger);}
</style>
<body>

<div class="shell">

  <!-- ═══════ SIDEBAR ═══════ -->
  <div class="sidebar">
    <div class="sidebar-brand">
      <span class="logo">🎬</span>
      <div><h1>Playlist Manager</h1><p>v3 workspace</p></div>
    </div>

    <div class="sb-section">
      <button class="sb-nav-btn active" id="navWorkspace" onclick="Nav.go('workspace')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Collections
      </button>
      <button class="sb-nav-btn" id="navAnalytics" onclick="openAnalyticsModal()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        Analytics
      </button>
      <button class="sb-nav-btn" id="navSettings" onclick="toggleSettingsMenu()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
        Settings
      </button>
    </div>

    <button class="sb-create-btn" onclick="RuleBuilder.resetForNew();Builder.open();">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Create Collection / Playlist
    </button>

    <div class="sb-section" style="margin-top:18px;">
      <div class="sb-label">Filter by source</div>
      <div class="sb-source-filter" id="sourceFilterList"><!-- populated by JS --></div>
    </div>

    <div class="sb-status">
      <div class="sb-status-row"><span>Sync</span><b id="sbSyncState">—</b></div>
      <div class="sb-status-row"><span>Last run</span><b id="sbLastSync">—</b></div>
      <div class="sb-status-row"><span>Schedules</span><b id="sbSchedCount">0</b></div>
      <div class="sb-status-row"><span><span class="sb-health-dot" id="sbHealthDot"></span> Backend</span><b id="sbHealthText">ok</b></div>
      <button class="sb-sync-now-btn" onclick="triggerQuickSync()">⟲ Sync lists now</button>
    </div>
  </div>

  <!-- ═══════ MAIN ═══════ -->
  <div class="main">
    <div class="main-header">
      <h2>Collections</h2>
      <div class="search-box">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search collections…" oninput="CollectionList.render()">
      </div>
    </div>

    <div class="main-body">

      <!-- Builder panel: hidden until "New Collection" clicked -->
      <div class="builder-panel" id="builderPanel">
        <div class="builder-head">
          <h3>Create Collection / Playlist</h3>
          <div class="builder-mode-tabs" id="builderModeTabs"><!-- populated by JS --></div>
          <button class="builder-close" onclick="Builder.close()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="builder-content" id="builderContent"><!-- mode-specific UI rendered by JS --></div>
      </div>

      <div class="list-head" id="listHead"><!-- rendered by JS, clickable to sort/reverse --></div>
      <div id="collectionListBody"><!-- rows rendered by JS --></div>

    </div>
  </div>

</div>

<!-- Row context-menu popup (single shared instance, repositioned per row) -->
<div class="row-popup" id="rowPopup"></div>

<!-- Hover preview popup -->
<div class="hover-preview" id="hoverPreview"></div>

<!-- Collection Detail panel -->
<div class="mini-modal-bg" id="detailModalBg">

      </button>
    </div>
    <div class="mini-modal-body" id="detailModalBody"></div>
    <div class="mini-modal-foot" id="detailModalFoot"></div>
  </div>
</div>

<!-- Publish Settings modal -->
<div class="mini-modal-bg" id="publishModalBg">
  <div class="mini-modal">
    <div class="mini-modal-head">
      <h3 id="publishModalTitle">Publish settings</h3>

        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="mini-modal-body" id="publishModalBody"></div>
    <div class="mini-modal-foot">
      <button class="btn btn-secondary" onclick="PublishPanel.close()">Close</button>

  </div>
</div>

<!-- Settings modal -->
<div class="mini-modal-bg" id="settingsModalBg">
  <div class="mini-modal" style="width:580px;">
    <div class="mini-modal-head">
      <h3>Settings</h3>

    </div>

    <div class="mini-modal-body" id="settingsModalBody" style="min-height:280px;"></div>

</div>

<!-- Analytics modal -->
<div class="mini-modal-bg" id="analyticsModalBg">

    </div>

  </div>
</div>

// Every creation path (Import/Franchise/CSV/Smart) needs the new collection
// to show up on the main list immediately — without this, the list only
// ever reflects what was already in localStorage at page load, since none
// of the backend create endpoints write to this key themselves.
function upsertLocalCollection(entry){
  try{
    var stored = JSON.parse(localStorage.getItem('cp_saved_collections') || '[]');
    var idx = stored.findIndex(function(c){ return c.embyId === entry.embyId; });
    if(idx > -1) stored[idx] = Object.assign({}, stored[idx], entry);
    else stored.push(entry);
    localStorage.setItem('cp_saved_collections', JSON.stringify(stored));
  } catch(e){ console.warn('Could not update local collections list:', e.message); }
}

/* ═══════════════════════════════════════════════
   DATA LAYER
   Collections come from the same localStorage key the existing app already
   populates (cp_saved_collections) — richer than any current GET endpoint
   returns, and means this view shows real data immediately with zero
   backend changes. Schedules come from the existing /api/smart/schedules
   endpoint and get merged in by ruleId/playlistName.
   ═══════════════════════════════════════════════ */
const AppData = {
  collections: [],
  schedules: [],
  syncStatus: null,

  loadCollectionsFromStorage(){
    try {
      var raw = localStorage.getItem('cp_saved_collections');
      this.collections = raw ? JSON.parse(raw) : [];
    } catch(e){
      console.warn('Could not read cp_saved_collections:', e.message);
      this.collections = [];
    }
  },

  async loadSchedules(){
    try {
      var r = await fetch('/api/smart/schedules');
      var data = await r.json();
      this.schedules = (data.success && data.schedules) || [];
    } catch(e){
      console.warn('Could not load schedules:', e.message);
      this.schedules = [];
    }
  },

  async loadSyncStatus(){
    try {
      var r = await fetch('/api/sync-status');
      this.syncStatus = await r.json();
    } catch(e){
      console.warn('Could not load sync status:', e.message);
      this.syncStatus = null;
    }
  },

  async loadAll(){
    this.loadCollectionsFromStorage();
    await Promise.all([this.loadSchedules(), this.loadSyncStatus()]);
  },

  // A schedule is itself a "collection" once it has run at least once and
  // created an Emby BoxSet — surfaced in the same unified list, tagged smart.
  unifiedRows(){
    var rows = this.collections.map(function(c){
      return {
        embyId: c.embyId,
        name: c.name,
        source: c.source === 'Trakt' ? 'Trakt' : (c.source === 'MDBlists' ? 'MDBlists' : (c.source === 'smart' ? 'smart' : (c.source === 'Playlist' || c.kind === 'playlist' ? 'Playlist' : 'emby'))),
        itemCount: (c.originalTitles || c.importedTitles || []).length,
        missingCount: (c.missingTitles || []).length,
        lastSync: c.lastSourceFetch || c.savedAt || null,
        raw: c,
        kind: 'collection'
      };
    });

    // A schedule that has already run has a real Emby collection sitting in
    // cp_saved_collections (source:'smart') under the same playlistName — only
    // show the schedule as its own row if it's never run yet (no collection to match)
    var smartNames = new Set(rows.filter(function(r){ return r.source === 'smart'; }).map(function(r){ return r.name; }));

    this.schedules.forEach(function(s){
      if(smartNames.has(s.playlistName)) return; // already represented by its real collection row
      rows.push({
        embyId: null,
        name: s.playlistName,
        source: 'smart',
        itemCount: null,
        missingCount: null,
        lastSync: s.lastRun || s.createdAt || null,
        raw: s,
        kind: 'schedule-pending'
      });
    });

    return rows;
  }
};

/* ═══════════════════════════════════════════════
   COLLECTION LIST — render, filter, search, sort, row menu
   ═══════════════════════════════════════════════ */
const activeSourceFilters = new Set(['Trakt','MDBlists','smart','Playlist','emby']);

const CollectionList = {
  sortField: 'name',
  sortDir: 'asc',

  setSort(field){
    if(this.sortField === field){
      this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      this.sortField = field;
      this.sortDir = (field === 'items' || field === 'recent') ? 'desc' : 'asc'; // sensible default per field
    }
    this.render();
  },

  renderHead(){
    var self = this;
    function header(field, label, extraStyle){
      var active = self.sortField === field;
      var arrow = active ? (self.sortDir === 'asc' ? '▲' : '▼') : '▼';
      return '<button class="sort-header' + (active?' active':'') + '" style="' + (extraStyle||'') + '" onclick="CollectionList.setSort(\'' + field + '\')">' + label + '<span class="arrow">' + arrow + '</span></button>';
    }
    el('listHead').innerHTML =
      '<span></span>' +
      '<span>' + header('name', 'Name') + '</span>' +
      '<span>' + header('source', 'Source') + '</span>' +
      '<span style="text-align:right;">' + header('items', 'Items', 'justify-content:flex-end;width:100%;') + '</span>' +
      '<span>' + header('recent', 'Updated') + '</span>' +
      '<span></span>';
  },

  render(){
    this.renderHead();
    var search = (el('searchInput').value || '').toLowerCase().trim();
    var sortField = this.sortField, sortDir = this.sortDir;

    var rows = AppData.unifiedRows().filter(function(r){
      if(!activeSourceFilters.has(r.source)) return false;
      if(search && r.name.toLowerCase().indexOf(search) === -1) return false;
      return true;
    });

    rows.sort(function(a,b){
      var cmp;
      if(sortField === 'items') cmp = (a.itemCount||0) - (b.itemCount||0);
      else if(sortField === 'source') cmp = a.source.localeCompare(b.source);
      else if(sortField === 'recent') cmp = new Date(a.lastSync||0) - new Date(b.lastSync||0);
      else cmp = a.name.localeCompare(b.name);
      return sortDir === 'asc' ? cmp : -cmp;
    });

    var body = el('collectionListBody');

    if(rows.length === 0){
      body.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>No collections match — try clearing the search or source filter.</p></div>';
      return;
    }

    body.innerHTML = rows.map(function(r, idx){
      var meta = sourceMeta(r.source);
      var statusHtml = r.kind === 'schedule-pending'
        ? '<span class="status-pill idle">Never run</span>'
        : (r.missingCount
            ? '<span class="status-pill warn" style="cursor:pointer;" onclick="event.stopPropagation();DetailPanel.open(' + idx + ')">' + r.missingCount + ' missing</span>'
            : '<span class="status-pill ok">Up to date</span>');

      var itemsHtml = r.itemCount !== null
        ? '<span class="mono">' + r.itemCount + '</span>'
        : '<span class="mono" style="color:var(--text3);">—</span>';

      return '' +
        '<div class="coll-row src-' + meta.css + '" data-idx="' + idx + '">' +
          '<div class="coll-thumb" onmouseover="HoverPreview.show(\'' + (r.embyId||'') + '\', event)" onmouseout="HoverPreview.hide()"></div>' +
          '<div><div class="coll-name" onclick="DetailPanel.open(' + idx + ')">' + esc(r.name) + '</div></div>' +
          '<span class="src-badge ' + meta.css + '"><span class="dot" style="background:currentColor;"></span>' + meta.label + '</span>' +
          '<div class="item-count">' + itemsHtml + '</div>' +
          '<div>' + statusHtml + '</div>' +
          '<button class="row-menu-btn" onclick="CollectionList.openMenu(event, ' + idx + ')">' +
            '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="12" cy="19" r="1.8"/></svg>' +
          '</button>' +
        '</div>';
    }).join('');

    this._currentRows = rows;
  },

  openDetail(idx){
    var row = this._currentRows[idx];
    if(row.embyId) openCollectionInEmby(row.embyId);
  },

  // Context-sensitive row menu — only shows actions that genuinely apply to
  // this row's source/kind, rather than one fixed menu for every row.
  openMenu(e, idx){
    e.stopPropagation();
    var row = this._currentRows[idx];
    var popup = el('rowPopup');
    var items = [];

    if(row.kind !== 'schedule-pending'){
      items.push(['Open in Emby', "CollectionList.openDetail(" + idx + ")"]);
    }

    if(row.source === 'Trakt' || row.source === 'MDBlists'){
      items.push(['Preview sync', "RowActions.previewSync('" + row.embyId + "')"]);
      items.push(['Sync now', "RowActions.syncNow('" + row.embyId + "')"]);
    }
    if(row.source === 'smart'){
      items.push(['Edit rule', "RowActions.editRule(RowActions._getScheduleIdByName('" + esc(row.name) + "'))"]);
      items.push(['Run schedule now', "RowActions.runSchedule(RowActions._getScheduleIdByName('" + esc(row.name) + "'))"]);
      items.push([(row.raw.enabled ? 'Disable schedule' : 'Enable schedule'), "RowActions.toggleSchedule(RowActions._getScheduleIdByName('" + esc(row.name) + "'), " + !row.raw.enabled + ")"]);
      items.push(['Publish settings', "RowActions.publishSettings(RowActions._getScheduleIdByName('" + esc(row.name) + "'))"]);
    }
    if(row.missingCount){
      items.push(['Send missing to Radarr', "RowActions.sendMissingToRadarr('" + row.embyId + "')"]);
    }

    items.push(['__divider__']);
    if(row.kind === 'schedule-pending'){
      items.push(['Delete schedule', "RowActions.deleteSchedule('" + (row.raw.id||'') + "')", 'danger']);
    } else {
      items.push(['Delete collection', "RowActions.deleteCollection('" + row.embyId + "')", 'danger']);
    }

    popup.innerHTML = items.map(function(it){
      if(it[0] === '__divider__') return '<hr>';
      return '<button class="' + (it[2]||'') + '" onclick="' + it[1] + ';CollectionList.closeMenu();">' + it[0] + '</button>';
    }).join('');

    var rect = e.currentTarget.getBoundingClientRect();
    popup.style.top = rect.bottom + 4 + 'px';
    popup.style.left = (rect.right - 190) + 'px';
    popup.classList.add('open');
  },

  closeMenu(){
    el('rowPopup').classList.remove('open');
  }
};

document.addEventListener('click', function(e){
  var popup = el('rowPopup');
  if(popup && !popup.contains(e.target) && !e.target.closest('.row-menu-btn')){
    popup.classList.remove('open');
  }
});

function openCollectionInEmby(embyId){
  if(!embyId || !AppConfig.embyUrl){ toast('Emby server URL not loaded yet', 'err'); return; }

  if(AppConfig.serverId) url += '&serverId=' + encodeURIComponent(AppConfig.serverId);
  window.open(url, '_blank');
}

function confirmAction(message){
  return Promise.resolve(window.confirm(message));
}

const RowActions = {
  // Helper: find schedule ID by name (used for smart collections that have already run)
  _getScheduleIdByName(playlistName){
    var sched = AppData.schedules.find(function(s){ return s.playlistName === playlistName; });
    return sched ? sched.id : '';
  },

  async previewSync(embyId){
    toast('Preview uses the global list sync (no per-collection preview exists in the backend yet) — running it now…', 'inf');
    await this._runGlobalSync(true);
  },

  async syncNow(embyId){
    toast('Syncing all Trakt/MDBlists lists (the backend syncs as one batch, not per-collection)…', 'inf');
    await this._runGlobalSync(false);
  },

  async _runGlobalSync(dryRun){
    try{
      var r = await fetch('/api/sync-lists', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({dryRun:dryRun}) });
      var result = await r.json();
      if(!result.success){ toast('Sync failed: ' + (result.error||'Unknown error'), 'err'); return; }
      var verb = dryRun ? 'Would change' : 'Changed';
      toast('✓ ' + verb + ': +' + (result.totalAdded||0) + ' / -' + (result.totalRemoved||0), 'ok');
      if(!dryRun){
        await AppData.loadAll();
        renderSourceFilter(); renderSidebarStatus(); CollectionList.render();
      }
    } catch(e){ toast('Sync request failed: ' + e.message, 'err'); }
  },

  async editRule(scheduleId){
    if(!scheduleId){ toast('No schedule ID for this row', 'err'); return; }
    try{
      var r = await fetch('/api/smart/schedules/' + scheduleId);
      var result = await r.json();
      if(!result.success){ toast('Could not load schedule: ' + (result.error||'Unknown error'), 'err'); return; }
      BuilderModes.switchTo('rule');
      Builder.open();
      RuleBuilder.loadFromSchedule(result.schedule);
    } catch(e){ toast('Load failed: ' + e.message, 'err'); }
  },

  async toggleSchedule(scheduleId, enabled){
    try{
      var r = await fetch('/api/smart/schedules/' + scheduleId, {
        method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({enabled:enabled})
      });
      var result = await r.json();
      if(!result.success){ toast('Could not update: ' + (result.error||'Unknown error'), 'err'); return; }
      toast(enabled ? '✓ Schedule enabled' : 'Schedule disabled', 'ok');
      await AppData.loadAll();
      renderSourceFilter(); renderSidebarStatus(); CollectionList.render();
    } catch(e){ toast('Update failed: ' + e.message, 'err'); }
  },

  async runSchedule(scheduleId){
    toast('Running schedule…', 'inf');
    try{
      var r = await fetch('/api/smart/schedules/' + scheduleId + '/run', { method:'POST' });
      var result = await r.json();
      if(!result.success){ toast('Run failed: ' + (result.error||'Unknown error'), 'err'); return; }
      var matched = (result.execution && result.execution.itemsMatched) || 0;
      var playlistId = result.execution && result.execution.playlistId;
      if(playlistId){
        var sched = AppData.schedules.find(function(s){ return s.id === scheduleId; });
        var coll = { embyId: playlistId, name: (sched?sched.playlistName:'Smart Collection'), source: 'smart', originalTitles: [], importedTitles: [], missingTitles: [], savedAt: new Date().toISOString() };
        
        // Fetch items to populate originalTitles so item count displays correctly
        try {
          var itemsResp = await fetch('/api/collections/' + playlistId + '/items?limit=500');
          var itemsData = await itemsResp.json();
          if(itemsData.success && itemsData.items){
            coll.originalTitles = itemsData.items.map(function(i){ return i.name; });
          }
        } catch(e2){
          console.warn('Could not fetch items for newly created collection:', e2.message);
        }
        
        upsertLocalCollection(coll);
      }
      toast('✓ Schedule ran — ' + matched + ' items matched', 'ok');
      await AppData.loadAll();
      renderSourceFilter(); renderSidebarStatus(); CollectionList.render();
    } catch(e){ toast('Run request failed: ' + e.message, 'err'); }
  },

  publishSettings(scheduleId){ PublishPanel.open(scheduleId); },

  sendMissingToRadarr(embyId){ DetailPanel.openByEmbyId(embyId); },

  async deleteCollection(embyId){
    if(!embyId){ toast('No Emby ID for this row', 'err'); return; }
    var ok = await confirmAction('Delete this collection from Emby and remove its saved data? This cannot be undone.');
    if(!ok) return;
    try{
      var r = await fetch('/api/chrono/collections/' + encodeURIComponent(embyId) + '/teardown', { method:'POST' });
      var result = await r.json();
      if(!result.success){ toast('Delete failed: ' + (result.error||'Unknown error'), 'err'); return; }

      // Keep localStorage in step with the backend, same cleanup the main app does
      try{
        var stored = JSON.parse(localStorage.getItem('cp_saved_collections') || '[]');
        localStorage.setItem('cp_saved_collections', JSON.stringify(stored.filter(function(c){ return c.embyId !== embyId; })));
      } catch(e){}

      toast('✓ Deleted', 'ok');
      await AppData.loadAll();
      renderSourceFilter(); renderSidebarStatus(); CollectionList.render();
    } catch(e){ toast('Delete request failed: ' + e.message, 'err'); }
  },

  async deleteSchedule(scheduleId){
    if(!scheduleId){ toast('No schedule ID for this row', 'err'); return; }
    var ok = await confirmAction('Delete this schedule? This cannot be undone.');
    if(!ok) return;
    try{
      var r = await fetch('/api/smart/schedules/' + scheduleId, { method:'DELETE' });
      var result = await r.json();
      if(!result.success){ toast('Delete failed: ' + (result.error||'Unknown error'), 'err'); return; }
      toast('✓ Schedule deleted', 'ok');
      await AppData.loadAll();
      renderSourceFilter(); renderSidebarStatus(); CollectionList.render();
    } catch(e){ toast('Delete request failed: ' + e.message, 'err'); }
  }
};

/* ---------- Sidebar: source filter + status ---------- */
function renderSourceFilter(){
  var rows = AppData.unifiedRows();
  var counts = {Trakt:0, MDBlists:0, smart:0, Playlist:0, emby:0};
  rows.forEach(function(r){ counts[r.source] = (counts[r.source]||0) + 1; });

  var order = ['Trakt','MDBlists','smart','Playlist','emby'];
  el('sourceFilterList').innerHTML = order.map(function(src){
    var meta = sourceMeta(src);
    var active = activeSourceFilters.has(src);
    return '<div class="sb-source-row' + (active?'':' disabled') + '" onclick="toggleSourceFilter(\'' + src + '\')">' +
      '<span class="sb-source-dot" style="background:var(--src-' + meta.css + ');"></span>' +
      meta.label + '<span class="cnt">' + (counts[src]||0) + '</span>' +
    '</div>';
  }).join('');
}

function toggleSourceFilter(src){
  if(activeSourceFilters.has(src)) activeSourceFilters.delete(src);
  else activeSourceFilters.add(src);
  
  // Persist to localStorage
  localStorage.setItem('activeSourceFilters', JSON.stringify(Array.from(activeSourceFilters)));
  
  renderSourceFilter();
  CollectionList.render();
}

function renderSidebarStatus(){
  var s = AppData.syncStatus;
  if(!s) return;
  el('sbSyncState').textContent = s.enabled ? 'Enabled' : 'Off';
  el('sbLastSync').textContent = s.lastSync ? formatTimeAgo(s.lastSync) : 'Never';
  el('sbSchedCount').textContent = AppData.schedules.length;
  el('sbHealthDot').classList.toggle('bad', false);
  el('sbHealthText').textContent = 'ok';
}

function formatTimeAgo(iso){
  var diff = Date.now() - new Date(iso).getTime();
  var mins = Math.floor(diff/60000);
  if(mins < 1) return 'just now';
  if(mins < 60) return mins + 'm ago';
  var hrs = Math.floor(mins/60);
  if(hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs/24) + 'd ago';
}

/* ═══════════════════════════════════════════════
   EMBY API HELPERS — reads serverUrl/token/userId from
   the same localStorage key the Settings tab writes to
   ═══════════════════════════════════════════════ */
function getEmbySettings() {
  var settings = {};
  try {
    var stored = localStorage.getItem('emby_unified_settings');
    if (stored) settings = JSON.parse(stored);
  } catch(e) {
    console.warn('Could not parse emby_unified_settings:', e.message);
  }
  return {
    serverUrl: settings.serverUrl || '',
    token: settings.token || '',
    userId: settings.userId || ''
  };
}

async function apiGet(path) {
  var settings = getEmbySettings();
  if (!settings.serverUrl || !settings.token) {
    throw new Error('Emby not configured — set it up in Settings');
  }
  var separator = path.indexOf('?') >= 0 ? '&' : '?';
  var fullUrl = settings.serverUrl + '/emby' + path + separator + 'api_key=' + encodeURIComponent(settings.token);

  const response = await fetch(fullUrl);
  if (!response.ok) {
    throw new Error(`Emby API failed: ${response.status} ${response.statusText}`);
  }
  return response.json();
}

async function apiPost(path, body) {
  var settings = getEmbySettings();
  if (!settings.serverUrl || !settings.token) {
    throw new Error('Emby not configured — set it up in Settings');
  }
  var separator = path.indexOf('?') >= 0 ? '&' : '?';
  var fullUrl = settings.serverUrl + '/emby' + path + separator + 'api_key=' + encodeURIComponent(settings.token);

  const response = await fetch(fullUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : null
  });
  if (!response.ok) {
    throw new Error(`Emby API failed: ${response.status} ${response.statusText}`);
  }
  // Emby POST endpoints (Move, add items) often return 204 No Content
  var text = await response.text();
  return text ? JSON.parse(text) : {};
}

const MODES = [
  { id:'rule',     label:'Rule (Smart)' },
  { id:'franchise',label:'Franchise / Timeline' },
  { id:'frch-edit',label:'Edit Franchises' },
  { id:'csv',      label:'CSV Import' },
  { id:'trakt',    label:'Trakt List' },
  { id:'mdblists', label:'MDBlists' }
];

const BuilderModes = {
  current: 'rule',

  render(){
    el('builderModeTabs').innerHTML = MODES.map(function(m){
      return '<button class="builder-mode-tab' + (m.id===BuilderModes.current?' active':'') + '" onclick="BuilderModes.switchTo(\'' + m.id + '\')">' + m.label + '</button>';
    }).join('');
    this.renderContent();
  },

  switchTo(modeId){
    this.current = modeId;
    this.render();
  },

  renderContent(){
    var content = el('builderContent');
    console.log('renderContent() called, current mode:', this.current);
    if(this.current === 'rule'){
      RuleBuilder.mount(content);
    } else if(this.current === 'trakt' || this.current === 'mdblists'){
      ImportBuilder.mount(content, this.current === 'trakt' ? 'Trakt' : 'MDBlists');
    } else if(this.current === 'franchise'){
      FranchiseBuilder.mount(content);
    } else if(this.current === 'frch-edit'){
      FranchiseEditor.mount(content);
    } else if(this.current === 'csv'){
      CsvBuilder.mount(content);
    } else {
      var modeLabel = MODES.find(function(m){ return m.id === BuilderModes.current; }).label;
      content.innerHTML = '<div class="empty-state"><div class="icon">🚧</div><p><b>' + modeLabel + '</b> — next iteration. Rule, Trakt List, and MDBlists modes are fully wired; Franchise/CSV follow the same pattern.</p></div>';
    }
  }
};

/* ---------- Rule (Smart) builder — fully wired ---------- */
const RuleBuilder = {
  conditions: [{ field:'isUnplayed', operator:'is', value:'' }],
  logic: 'AND',
  editingScheduleId: null,
  editingRuleId: null,

  loadFromSchedule(sched){
    this.editingScheduleId = sched.id;
    this.editingRuleId = sched.ruleId;
    this.conditions = (sched.rule && sched.rule.conditions && sched.rule.conditions.length)
      ? sched.rule.conditions.map(function(c){ return Object.assign({}, c); })
      : [{ field:'isUnplayed', operator:'is', value:'' }];
    this.logic = (sched.rule && (sched.rule.logic || sched.rule.type)) || 'AND';
    this.mount(el('builderContent'));
    el('ruleName').value = sched.playlistName || '';
    toast('Loaded "' + sched.playlistName + '" — edit and save to update it', 'inf');
  },

  resetForNew(){
    this.editingScheduleId = null;
    this.editingRuleId = null;
    this.conditions = [{ field:'isUnplayed', operator:'is', value:'' }];
    this.logic = 'AND';
  },

  mount(container){
    container.innerHTML =
      '<div class="field-row">' +
        '<div class="field"><label>Collection name</label><input type="text" id="ruleName" placeholder="e.g. Unwatched Sci-Fi"></div>' +
      '</div>' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin:10px 0 8px;">' +
        '<label style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;">Conditions</label>' +
        '<div class="logic-pill">' +
          '<button class="' + (this.logic==='AND'?'active':'') + '" onclick="RuleBuilder.setLogic(\'AND\')">AND</button>' +
          '<button class="' + (this.logic==='OR'?'active':'') + '" onclick="RuleBuilder.setLogic(\'OR\')">OR</button>' +
        '</div>' +
      '</div>' +
      '<div id="conditionRows"></div>' +
      '<button class="btn btn-secondary" onclick="RuleBuilder.addCondition()" style="margin-top:6px;">+ Add condition</button>' +
      '<div style="display:flex;gap:8px;margin-top:16px;">' +
        '<button class="btn btn-secondary" onclick="RuleBuilder.preview()">Preview matches</button>' +
        '<button class="btn btn-primary" onclick="RuleBuilder.save()">' + (this.editingScheduleId ? 'Save changes' : 'Create collection') + '</button>' +
      '</div>' +
      '<div id="rulePreviewBox"></div>';
    this.renderConditions();
  },

  renderConditions(){
    el('conditionRows').innerHTML = this.conditions.map(function(c, i){
      return '<div class="condition-row">' +
        '<select onchange="RuleBuilder.update(' + i + ',\'field\',this.value)">' +
          ['isUnplayed','isMovie','genre','criticRating','year','studio','director','runtime','language','country','actor','rating','officialRating','isFavorite','isSeries','title'].map(function(f){
            return '<option value="' + f + '"' + (c.field===f?' selected':'') + '>' + f + '</option>';
          }).join('') +
        '</select>' +
        '<select onchange="RuleBuilder.update(' + i + ',\'operator\',this.value)">' +
          ['is','contains','equals','!=','startsWith','endsWith','>','<','>=','<=','between'].map(function(op){
            return '<option value="' + op + '"' + (c.operator===op?' selected':'') + '>' + op + '</option>';
          }).join('') +
        '</select>' +
        '<input type="text" value="' + esc(c.value) + '" onchange="RuleBuilder.update(' + i + ',\'value\',this.value)" placeholder="value" style="flex:1;">' +
        '<button class="row-menu-btn" onclick="RuleBuilder.removeCondition(' + i + ')">✕</button>' +
      '</div>';
    }).join('');
  },

  setLogic(l){ this.logic = l; this.mount(el('builderContent')); },
  addCondition(){ this.conditions.push({field:'isUnplayed',operator:'is',value:''}); this.renderConditions(); },
  removeCondition(i){ this.conditions.splice(i,1); this.renderConditions(); },
  update(i, key, val){ this.conditions[i][key] = val; },

  async preview(){
    var box = el('rulePreviewBox');
    box.innerHTML = '<div class="preview-box">Checking your library…</div>';
    try {
      var r = await fetch('/api/rules/preview', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ logic:this.logic, conditions:this.conditions })
      });
      var result = await r.json();
      if(!result.success){
        box.innerHTML = '<div class="preview-box" style="color:var(--danger);">' + esc(result.error||'Preview failed') + '</div>';
        return;
      }
      var sampleHtml = (result.sample||[]).map(function(m){ return '<li>' + esc(m.name) + (m.year?' ('+m.year+')':'') + '</li>'; }).join('');
      box.innerHTML = '<div class="preview-box">' +
        '<span class="count">' + result.count + '</span> of ' + result.totalLibrarySize + ' movies match' +
        (result.sample && result.sample.length ? '<ul class="preview-list">' + sampleHtml + '</ul>' : '') +
      '</div>';
    } catch(e){
      box.innerHTML = '<div class="preview-box" style="color:var(--danger);">' + esc(e.message) + '</div>';
    }
  },

  async save(){
    var name = (el('ruleName').value || '').trim();
    if(!name){ toast('Name the collection first', 'warn'); return; }
    if(!this.conditions.length){ toast('Add at least one condition', 'warn'); return; }

    try{
      var createResp = await fetch('/api/smart/create-collection', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          rule: { logic: this.logic, conditions: this.conditions },
          playlistName: name,
          description: ''
        })
      });
      var created = await createResp.json();
      if(!created.success){ toast('Could not create collection: ' + (created.error||'Unknown error'), 'err'); return; }
      
      var collectionId = created.collection.id;
      var itemCount = created.collection.itemCount;
      var itemTitles = created.collection.itemTitles || [];
      var scheduleId = created.collection.scheduleId;

      upsertLocalCollection({ 
        embyId: collectionId, 
        name: name, 
        source: 'smart', 
        originalTitles: itemTitles, 
        importedTitles: itemTitles, 
        missingTitles: [], 
        savedAt: new Date().toISOString(),
        scheduleId: scheduleId
      });

      toast('✓ "' + esc(name) + '" created — ' + itemCount + ' items', 'ok');

      this.resetForNew();
      Builder.close();
      await AppData.loadAll();
      renderSourceFilter(); renderSidebarStatus(); CollectionList.render();
      
      // Open publish modal for the newly created collection
      setTimeout(() => {
        var schedule = AppData.schedules.find(s => s.id === scheduleId);
        if(schedule) PublishPanel.render(schedule);
        el('publishModalBg').classList.add('open');
      }, 100);
    } catch(e){
      toast('Save failed: ' + e.message, 'err');
    }
  }
};

  async open(scheduleId){
    if(!scheduleId){
      el('publishModalBody').innerHTML = '<div class="preview-box" style="color:var(--danger);">Error: Schedule ID is missing. Try refreshing the page.</div>';
      return;
    }
    this.scheduleId = scheduleId;
    el('publishModalBg').classList.add('open');
    el('publishModalBody').innerHTML = '<div class="preview-box">Loading…</div>';
    try{
      var r = await fetch('/api/smart/schedules/' + scheduleId);
      var result = await r.json();
      if(!result.success || !result.schedule){ 
        el('publishModalBody').innerHTML = '<div class="preview-box" style="color:var(--danger);">' + esc((result.error||'Schedule not found')) + '</div>'; 
        return; 
      }
      this.render(result.schedule);
    } catch(e){
      el('publishModalBody').innerHTML = '<div class="preview-box" style="color:var(--danger);">' + esc(e.message) + '</div>';
    }

  render(sched){
    el('publishModalTitle').textContent = 'Publish: ' + sched.playlistName;
    var traktLink = sched.traktListUrl ? '<a href="' + esc(sched.traktListUrl) + '" target="_blank">View list →</a>' : '<span style="color:var(--text3);">Not published yet</span>';
    var mdbLink = sched.mdblistListUrl ? '<a href="' + esc(sched.mdblistListUrl) + '" target="_blank">View list →</a>' : '<span style="color:var(--text3);">Not published yet</span>';

    el('publishModalBody').innerHTML =
      '<div class="toggle-row">' +
        '<div class="label"><b>Trakt</b><span id="traktLinkText">' + traktLink + '</span></div>' +
        '<label class="switch"><input type="checkbox" id="pubTrakt" ' + (sched.publishToTrakt?'checked':'') + ' onchange="PublishPanel.toggle(\'Trakt\', this.checked)"><span class="track"><span class="knob"></span></span></label>' +
      '</div>' +
      '<div class="toggle-row">' +
        '<div class="label"><b>MDBlists</b><span id="mdbLinkText">' + mdbLink + '</span></div>' +
        '<label class="switch"><input type="checkbox" id="pubMdb" ' + (sched.publishToMDBlists?'checked':'') + ' onchange="PublishPanel.toggle(\'MDBlists\', this.checked)"><span class="track"><span class="knob"></span></span></label>' +
      '</div>' +
      '<p style="font-size:11px;color:var(--text3);margin-top:12px;">MDBlists uses your account\'s saved API key automatically — no extra setup needed here.</p>';

  async toggle(service, checked){
    var body = service === 'Trakt' ? { publishToTrakt: checked } : { publishToMDBlists: checked };

      var r = await fetch('/api/smart/schedules/' + this.scheduleId + '/publish-settings', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
      });
      var result = await r.json();
      if(!result.success){ toast('Could not update: ' + (result.error||'Unknown error'), 'err'); return; }
      toast(service + ' publishing ' + (checked?'enabled':'disabled'), 'ok');
    } catch(e){ toast('Update failed: ' + e.message, 'err'); }

  async publishNow(){
    toast('Publishing…', 'inf');
    try{
      var r = await fetch('/api/smart/schedules/' + this.scheduleId + '/publish', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({dryRun:false})
      });
      var result = await r.json();
      if(!result.success){ toast('Publish failed: ' + (result.error||'Unknown error'), 'err'); return; }
      var total = (result.traktAdded||0)+(result.mdblistAdded||0)+(result.traktRemoved||0)+(result.mdblistRemoved||0);
      toast(total>0 ? '✓ Published — ' + total + ' change(s)' : '✓ Already up to date', 'ok');

  },

};

/* ---------- Import builder (Trakt + MDBlists share this) ---------- */
const ImportBuilder = {
  source: 'Trakt',
  lastPreview: null,
  lastBrowseLists: null,
  pickedIsLiked: false,

  mount(container, source){
    this.source = source;
    this.lastPreview = null;
    this.pickedIsLiked = false;
    var isTrakt = source === 'Trakt';

    container.innerHTML =
      '<div class="field-row">' +
        '<div class="field"><label>Collection name</label><input type="text" id="impName" placeholder="e.g. My Trakt Watchlist"></div>' +
      '</div>' +
      '<div class="field-row">' +
        '<div class="field"><label>List type</label><select id="impType" onchange="ImportBuilder.onTypeChange()">' +
          '<option value="own">My Lists</option><option value="watchlist">Watchlist</option><option value="other">Other user\'s list</option>' +
        '</select></div>' +
      '</div>' +
      '<div id="impOwnBrowseRow" style="display:none;margin-bottom:10px;"><button class="btn btn-secondary" onclick="ImportBuilder.browseUserLists()">Browse my lists</button><div class="hint" style="margin-top:4px;">Shows your own lists and your liked lists together, labeled by type.</div></div>' +
      '<div class="field-row" id="impUsernameRow" style="display:none;">' +
        '<div class="field"><label>Username</label><div style="display:flex;gap:6px;"><input type="text" id="impUsername" placeholder="' + (isTrakt?'trakt':'mdblists') + ' username" style="flex:1;">' +
        '<button class="btn btn-secondary" onclick="ImportBuilder.browseUserLists()">Browse</button>' +
        '</div></div>' +
      '</div>' +
      '<div id="impBrowseResults"></div>' +
      '<div class="field-row" id="impListIdRow">' +
        '<div class="field"><label>' + (isTrakt ? 'List ID or slug' : 'List ID (numeric)') + '</label><input type="text" id="impListId" placeholder="' + (isTrakt ? 'e.g. my-favorites' : 'e.g. 183714') + '"></div>' +
      '</div>' +
      '<div style="display:flex;gap:8px;margin-top:12px;">' +
        '<button class="btn btn-secondary" onclick="ImportBuilder.preview()">Preview</button>' +
        '<button class="btn btn-primary" id="impCreateBtn" onclick="ImportBuilder.create()" disabled>Create collection</button>' +
      '</div>' +
      '<div id="impPreviewBox"></div>';

    this.onTypeChange();
  },

  onTypeChange(){
    var type = el('impType').value;
    this.pickedIsLiked = false;
    el('impUsernameRow').style.display = (type === 'other') ? '' : 'none';
    el('impOwnBrowseRow').style.display = (type === 'own') ? '' : 'none';
    el('impListIdRow').style.display = (type === 'watchlist') ? 'none' : '';
    el('impBrowseResults').innerHTML = '';
  },

  async browseUserLists(opts){
    opts = opts || {};
    var type = el('impType').value;
    var username = type === 'other' ? (el('impUsername').value || '').trim() : null;
    if(type === 'other' && !username){ toast('Enter a username first', 'warn'); return; }

    var box = el('impBrowseResults');
    box.innerHTML = '<div class="preview-box">Loading lists…</div>';
    try{
      var combined = [];

      if(type === 'own' && !username){
        // "My Lists" combines your own + liked lists into one browse, each
        // tagged with its type — rather than making you pick a type first
        // and re-browse separately to check the other kind
        var ownEndpoint = this.source === 'Trakt' ? '/api/import/browse-trakt' : '/api/import/browse-mdblists';
        var likedEndpoint = this.source === 'Trakt' ? '/api/import/browse-trakt-liked' : '/api/import/browse-mdblists-liked';
        var [ownR, likedR] = await Promise.all([fetch(ownEndpoint), fetch(likedEndpoint)]);
        var ownResult = await ownR.json();
        var likedResult = await likedR.json();

        if(ownResult.success){
          combined = combined.concat(ownResult.lists.map(function(l){ return Object.assign({}, l, {_type:'My List', _liked:false}); }));
        }
        if(likedResult.success){
          combined = combined.concat(likedResult.lists.map(function(l){ return Object.assign({}, l, {_type:'Liked', _liked:true}); }));
        }
        if(!combined.length){
          var firstError = (!ownResult.success && ownResult.error) || (!likedResult.success && likedResult.error) || 'No lists found';
          box.innerHTML = '<div class="preview-box" style="color:var(--danger);">' + esc(firstError) + '</div>';
          return;
        }
      } else {
        var endpoint = this.source === 'Trakt' ? '/api/import/browse-trakt' : '/api/import/browse-mdblists';
        var url = endpoint + (username ? '?username=' + encodeURIComponent(username) : '');
        var r = await fetch(url);
        var result = await r.json();
        if(!result.success){ box.innerHTML = '<div class="preview-box" style="color:var(--danger);">' + esc(result.error) + '</div>'; return; }
        if(!result.lists.length){ box.innerHTML = '<div class="preview-box">No lists found.</div>'; return; }
        combined = result.lists.map(function(l){ return Object.assign({}, l, {_type: type === 'other' ? "Other's List" : 'List', _liked:false}); });
      }

      this.lastBrowseLists = combined;
      this.renderBrowseList(combined);
    } catch(e){
      box.innerHTML = '<div class="preview-box" style="color:var(--danger);">' + esc(e.message) + '</div>';
    }
  },

  renderBrowseList(lists){
    var box = el('impBrowseResults');
    var self = this;
    box.innerHTML = '<div class="preview-box" style="max-height:220px;overflow-y:auto;">' + lists.map(function(l){
      // MDBlists' /items endpoint needs the numeric id (slugs 404 there, even
      // though slugs work fine for Trakt's own/other-user lists) — and Trakt's
      // LIKED lists specifically also need the numeric id (different URL pattern:
      // /lists/{id}/items, not /users/{u}/lists/{slug}) — decided per-item now
      // that own+liked results are merged into one list
      var preferId = (self.source === 'MDBlists') || (self.source === 'Trakt' && l._liked);
      var identifier = preferId ? (l.id != null ? l.id : l.slug) : (l.slug || l.id);
      var typeLabel = l._type ? ' <span style="color:var(--text3);">(' + esc(l._type) + ')</span>' : '';
      return '<div class="missing-item" style="cursor:pointer;justify-content:space-between;" onclick="ImportBuilder.pickBrowsedList(\'' + esc(String(identifier)) + '\', \'' + esc(l.name).replace(/'/g,"\\'") + '\', ' + (!!l._liked) + ')">' +
        '<span>' + esc(l.name) + typeLabel + '</span><span class="n" style="font-family:var(--font-data);color:var(--text3);">' + l.itemCount + ' items</span></div>';
    }).join('') + '</div>';
  },

  pickBrowsedList(identifier, name, isLiked){
    el('impListId').value = identifier;
    this.pickedIsLiked = !!isLiked;
    // name here is always the clean title — the (My List)/(Liked) label is
    // only ever added for display in renderBrowseList, never passed through
    // to this function, so it never ends up in the created collection's name
    if(name) el('impName').value = name;
    el('impBrowseResults').innerHTML =
      '<div class="hint" style="cursor:pointer;" onclick="ImportBuilder.renderBrowseList(ImportBuilder.lastBrowseLists)">✓ Selected "' + esc(name) + '" — click to pick a different one</div>';
    toast('Selected "' + name + '" — hit Preview to check it against your library', 'inf');
  },

  buildPayload(){
    var type = el('impType').value;
    return {
      source: this.source,
      listId: el('impListId').value.trim(),
      isLiked: !!this.pickedIsLiked,
      isWatchlist: type === 'watchlist',
      username: type === 'other' ? el('impUsername').value.trim() : null
    };
  },

  async preview(){
    var box = el('impPreviewBox');
    var payload = this.buildPayload();
    if(!payload.isWatchlist && !payload.listId){ toast('Enter a list ID/slug, or choose Watchlist', 'warn'); return; }

    box.innerHTML = '<div class="preview-box">Fetching list and checking your library…</div>';
    el('impCreateBtn').disabled = true;
    try{
      var r = await fetch('/api/import/preview', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      var result = await r.json();
      if(!result.success){ box.innerHTML = '<div class="preview-box" style="color:var(--danger);">' + esc(result.error) + '</div>'; return; }

      this.lastPreview = result;
      var sampleHtml = result.matched.slice(0,8).map(function(m){ return '<li>✓ ' + esc(m.title) + '</li>'; }).join('') +
                        result.missing.slice(0,4).map(function(t){ return '<li style="color:var(--text3);">— ' + esc(t) + ' (not in library)</li>'; }).join('');

      box.innerHTML = '<div class="preview-box">' +
        '<span class="count">' + result.matchedCount + '</span> of ' + result.totalCount + ' titles found in your library' +
        (result.missingCount ? ' · ' + result.missingCount + ' missing' : '') +
        '<ul class="preview-list">' + sampleHtml + '</ul>' +
      '</div>';

      el('impCreateBtn').disabled = result.matchedCount === 0;
    } catch(e){
      box.innerHTML = '<div class="preview-box" style="color:var(--danger);">' + esc(e.message) + '</div>';
    }
  },

  async create(){
    var name = (el('impName').value || '').trim();
    if(!name){ toast('Name the collection first', 'warn'); return; }
    if(!this.lastPreview || !this.lastPreview.matchedCount){ toast('Run Preview first', 'warn'); return; }

    var payload = Object.assign(this.buildPayload(), {
      name: name,
      matchedEmbyIds: this.lastPreview.matched.map(function(m){ return m.embyId; }),
      allTitles: this.lastPreview.allTitles,
      missingTitles: this.lastPreview.missing || []
    });

    try{
      var r = await fetch('/api/import/create', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      var result = await r.json();
      if(!result.success){ toast('Create failed: ' + (result.error||'Unknown error'), 'err'); return; }

      upsertLocalCollection({
        embyId: result.collection.id, name: name, source: this.source,
        originalTitles: this.lastPreview.allTitles, importedTitles: this.lastPreview.allTitles,
        missingTitles: this.lastPreview.missing || [], savedAt: new Date().toISOString()
      });

      toast('✓ "' + esc(name) + '" created — ' + this.lastPreview.matchedCount + ' items', 'ok');
      Builder.close();
      await AppData.loadAll();
      renderSourceFilter(); renderSidebarStatus(); CollectionList.render();
    } catch(e){
      toast('Create request failed: ' + e.message, 'err');
    }
  }
};
